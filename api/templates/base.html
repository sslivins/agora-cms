<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Agora{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    {% block nav %}
    <header>
        <div class="nav-brand">Agora</div>
        <a href="/logout" class="logout-link">Logout</a>
    </header>
    <nav>
        <a href="/" class="nav-tab {% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
        <a href="/assets" class="nav-tab {% if request.url.path == '/assets' %}active{% endif %}">Assets</a>
        <a href="/playback" class="nav-tab {% if request.url.path == '/playback' %}active{% endif %}">Playback</a>
    </nav>
    {% endblock %}
    <main>
        {% block content %}{% endblock %}
    </main>
    <script src="/static/app.js"></script>
</body>
</html>

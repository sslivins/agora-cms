  /api/profiles/clear-errors:
    post:
      summary: Clear Transcode Errors
      description: |-
        Dismiss FAILED transcode variants from the Transcoding Queue panel.

        A FAILED variant is a permanent (non-retryable) transcode failure; it never
        transitions out on its own, so without this it lingers in the queue forever.
        This deletes the FAILED variant rows in the caller's visible scope (with
        best-effort output-file cleanup) and removes any matching transcode-failure
        notifications (one-way tie — clearing the queue clears the bell, but not the
        reverse).

        Composed-slide thumbnail snapshots that are still needed will be
        re-rendered by the worker's startup backfill, so clearing them is safe.

        Gated on ``profiles:write`` (Admin among built-in roles), unlike the
        read-only status panel which is visible to Operators/Viewers too.
      operationId: clear_transcode_errors_api_profiles_clear_errors_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/cms/logs:
    get:
      summary: Download Cms Logs
      description: |-
        Download the CMS in-memory log buffer as a zip.

        Small, synchronous endpoint used by the new UI flow to fetch CMS
        logs separately from per-device log bundles.  Does not reach
        across the network to devices, so it is safe to call on any
        replica.

        Replica-local caveat: under any multi-replica deployment behind a
        load balancer (including Azure Container Apps), the load balancer
        routes each HTTP request to an arbitrary replica, so the returned
        buffer reflects only that replica's recent logs.  In single-replica
        deployments this is the full CMS log buffer.  For a complete view
        across all replicas in a multi-replica deployment, use the Azure
        Log Analytics workspace (container stdout is shipped there).
      operationId: download_cms_logs_api_cms_logs_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}

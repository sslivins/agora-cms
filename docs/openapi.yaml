  /api/devices/{device_id}/logs/{request_id}/upload:
    post:
      summary: Upload Log Bundle
      description: |-
        Accept a Pi-originated tar.gz log bundle for ``request_id``.

        The path ``device_id`` is informational only — historically the Pi
        sends its CPU serial here, which does **not** equal the CMS-canonical
        ``Device.id`` for UUID-adopted devices.  Ownership is enforced by
        comparing the authenticated ``device.id`` to ``row.device_id`` so a
        compromised Pi can't poison another device's row.
      operationId: upload_log_bundle_api_devices__device_id__logs__request_id__upload_post
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          title: Device Id
      - name: request_id
        in: path
        required: true
        schema:
          type: string
          title: Request Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/mcp/auth:
    get:
      summary: Verify Mcp Token
      description: |-
        Validate a bearer token and return the resolved user's permissions.

        Called by the MCP server's ``BearerAuthMiddleware`` on every
        incoming connection.  Supports two authentication modes:

        1. **Personal MCP key** (existing path).  The bearer token is a
           ``key_type="mcp"`` API key owned by a user; the response carries
           that user's effective permissions.

        2. **Service key + X-On-Behalf-Of** (new — used by the in-process
           Assistant agent).  The bearer is the CMS-issued MCP service key
           (``agora_svc_...``) AND the ``X-On-Behalf-Of`` header carries
           the UUID of the user the request is acting for.  The response
           carries THAT user's effective permissions — never a synthetic
           "service" permission set.  This lets the CMS act as a trusted
           proxy without duplicating per-user secrets while keeping the
           per-tool permission gating identical to mode (1).

        Both modes share the same ``compute_effective_permissions`` path
        (user role ∩ MCP role ceiling).  No new privileged permission set
        is introduced.
      operationId: verify_mcp_token_api_mcp_auth_get
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
      - name: x-on-behalf-of
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-On-Behalf-Of
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'

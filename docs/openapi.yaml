          title: Url
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/issues/report/config:
    get:
      summary: Report Config
      description: |-
        Tell the UI whether the report-issue feature is enabled.

        The button is rendered server-side via a template flag, but this
        endpoint is useful for diagnostics and lets the modal guard the
        submit if the token is removed mid-session.
      operationId: report_config_api_issues_report_config_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Report Config Api Issues Report Config Get
  /api/issues/report:
    post:
      summary: Report Issue
      operationId: report_issue_api_issues_report_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportIssueRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportIssueResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/imager/fleets:
    get:
      summary: List Fleets
      description: |-
        Return the fleet IDs this CMS can register devices for.

        Source of truth is the ``fleets`` table (see
        :mod:`cms.services.fleet_registry`). Secrets themselves are
        never returned.
      operationId: list_fleets_api_imager_fleets_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/FleetOut'
                type: array
                title: Response List Fleets Api Imager Fleets Get
    post:
      summary: Create Fleet Endpoint
      description: |-
        Create a new fleet.

        The HMAC secret is server-generated (32 bytes from
        ``secrets.token_bytes``) and is **never** returned by this or
        any other endpoint -- once the row is written, only freshly-built
        images carry it. To replace the secret, delete the fleet and
        re-create it.

        Returns 409 if an active fleet with the given ``fleet_id``
        already exists.
      operationId: create_fleet_endpoint_api_imager_fleets_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FleetCreateBody'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FleetOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/imager/fleets/{fleet_id}:
    delete:
      summary: Delete Fleet Endpoint
      description: |-
        Soft-delete a fleet.

        Idempotent: returns 204 even if the fleet was already gone (the
        UI's "Delete" button shouldn't 404 on a stale list view).

        The row is soft-deleted (``deleted_at`` set) so existing
        ``provisioned_images.fleet_id`` audit values still resolve to a
        name in history views. Already-flashed Pis using this fleet's
        HMAC will be rejected with 401 from /register on next attempt.
      operationId: delete_fleet_endpoint_api_imager_fleets__fleet_id__delete
      parameters:
      - name: fleet_id
        in: path
        required: true
        schema:
          type: string
          title: Fleet Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/imager/settings:
    get:
      summary: Get Imager Settings
      description: |-
        Return the current imager runtime settings.

        Always 200; ``catalog_url`` may be ``None`` when unset, which the
        UI uses to disable the "Import from catalog" button.
      operationId: get_imager_settings_api_imager_settings_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagerSettingsOut'
    put:
      summary: Update Imager Settings
      description: |-
        Set the imager catalog URL.

        Validates that the URL is https and the host is in
        ``BASE_IMAGE_ALLOWED_HOSTS``.  Audited.
      operationId: update_imager_settings_api_imager_settings_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImagerSettingsUpdateBody'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagerSettingsOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/imager/catalog:
    get:
      summary: Get Catalog
      description: |-
        Live-fetch and parse the upstream catalog manifest.

        Side-effect-free; intended for the UI to populate the
        "import a new base image" picker without writing anything to DB.
      operationId: get_catalog_api_imager_catalog_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogOut'
  /api/imager/base-images:
    get:
      summary: List Base Images
      description: List cached base images, newest first.
      operationId: list_base_images_api_imager_base_images_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/BaseImageOut'
                type: array
                title: Response List Base Images Api Imager Base Images Get
    post:
      summary: Import Base Image
      description: |-
        Resolve ``(variant, version)`` against the catalog and enqueue an import.

        Behaviour matrix on the unique ``(variant, version)`` constraint:

        * No existing row → create + enqueue.
        * Existing READY → return existing row, do nothing.
        * Existing IMPORTING → return existing row, do nothing.
        * Existing FAILED → reset to IMPORTING, restamp catalog
          coordinates, re-enqueue.
      operationId: import_base_image_api_imager_base_images_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BaseImageImportBody'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseImageOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/imager/base-images/{base_image_id}:
    delete:
      summary: Delete Base Image
      description: |-
        Delete a cached base image (DB row + tenant blob).

        Built ``.img.xz`` artifacts are fully self-contained -- the imager
        pipeline embeds the OS into a fresh blob -- so removing a cached
        base image cannot break any existing build.  The
        ``provisioned_images.base_image_id`` FK is ``ON DELETE SET NULL``
        (with denormalized ``base_variant`` / ``base_version`` snapshot
        columns preserving the audit trail), so we can drop the row
        unconditionally here.
      operationId: delete_base_image_api_imager_base_images__base_image_id__delete
      parameters:
      - name: base_image_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Base Image Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/imager/build:
    post:
      summary: Build Provisioned Image
      description: |-
        Enqueue an ``IMAGE_PROVISION`` job and return the job handle.

        Validates that:

        * ``output_name`` is a safe ``.img.xz`` basename;
        * ``fleet_id`` is configured on this CMS (resolves to a secret);
        * ``base_image_id`` exists and is READY;
        * a CMS public base URL is configured (the firmware needs an
          absolute URL to call ``/api/devices/register``).
      operationId: build_provisioned_image_api_imager_build_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BuildBody'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobStatusOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/imager/softplayer-credentials:
    post:
      summary: Build Softplayer Credentials
      description: |-
        Render and return the ``softplayer.env`` body for a given fleet.

        The Windows-native ``agora-softplayer`` is bootstrap-v2-only: it
        authenticates to the CMS via the same fleet-HMAC pairing flow Pis
        use in production. Operators provision a softplayer by downloading
        this env file from the Imager tab and dropping it next to the .exe
        (or under ``%LOCALAPPDATA%\agora-softplayer\``).

        The output mirrors :func:`_fleet_env_payload`'s ``agora-fleet.env``
        body baked into Pi images -- same keys, same ``AGORA_FLEET_SECRET_HEX``
        encoding -- just delivered as a downloadable text file instead of
        inside an ``.img.xz``. The softplayer CLI consumes the same
        ``KEY=VALUE`` format.

        Validates that:

        * ``fleet_id`` matches ``_FLEET_ID_RE`` and is configured on this CMS
          (resolves to a secret).
        * ``settings.device_transport`` is ``local`` or ``wps``.
        * ``settings.base_url`` is set (the firmware needs an absolute URL).

        Audited via ``imager.softplayer_credentials.download``. No
        ``ProvisionedImage`` row is written -- the env file is ephemeral and
        regeneratable from the fleet at any time; revoking access means
        deleting the fleet (which invalidates the HMAC for every previously
        downloaded file).
      operationId: build_softplayer_credentials_api_imager_softplayer_credentials_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SoftplayerCredentialsBody'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/imager/provisioned-images:
    get:
      summary: List Provisioned Images
      description: |-
        List built ``.img.xz`` artifacts (newest first, capped at 200).

        The UI surfaces this as the "Built images" section on the Imager
        tab so admins can re-download or clean up artifacts long after
        the build job poller has exited.  ``download_job_id`` is the FK
        the existing ``/api/imager/download/{job_id}`` redirect needs --
        it mints a fresh SAS on every hit so SAS lifetime is never an
        operator-visible concern.
      operationId: list_provisioned_images_api_imager_provisioned_images_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ProvisionedImageOut'
                type: array
                title: Response List Provisioned Images Api Imager Provisioned Images Get
  /api/imager/provisioned-images/{provisioned_image_id}:
    delete:
      summary: Delete Provisioned Image
      description: |-
        Delete a built image (DB row + blob).

        Audited.  Idempotent against blob storage: a missing blob is a
        no-op (the lifecycle policy or a prior delete may have already
        cleaned it up).
      operationId: delete_provisioned_image_api_imager_provisioned_images__provisioned_image_id__delete
      parameters:
      - name: provisioned_image_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Provisioned Image Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/imager/jobs/{job_id}:
    get:
      summary: Get Job Status
      description: |-
        Return the status of an imager job.

        Filtered to imager job types so this endpoint cannot be used to
        peek at unrelated CMS jobs (transcode, capture, etc.).
      operationId: get_job_status_api_imager_jobs__job_id__get
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Job Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobStatusOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/imager/download/{job_id}:
    get:
      summary: Download Provisioned
      description: |-
        Return a 302 to a fresh SAS URL for the provisioned image.

        Audited.  404s when the job is unknown, not an ``IMAGE_PROVISION``,
        not yet succeeded, or whose row is no longer ``READY`` (e.g. the
        24 h Azure lifecycle policy has expired the blob and the row is
        now ``EXPIRED``).
      operationId: download_provisioned_api_imager_download__job_id__get
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Job Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/imager/download-url/{job_id}:
    get:
      summary: Download Url Provisioned
      description: |-
        Return a fresh SAS download URL for the provisioned image as JSON.

        Backs the built-images table's "Copy download link" kebab action
        so an operator can paste the URL into ``wget`` / ``curl`` from a
        Linux shell without going through the browser's redirect chain.

        Applies the same validation, blob-existence check, and SAS TTL
        as :func:`download_provisioned`.  Audited as ``imager.copy_link``
        so this is distinguishable from a normal browser download in the
        audit trail.
      operationId: download_url_provisioned_api_imager_download_url__job_id__get
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Job Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadUrlOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /healthz:
    get:
      tags:
      - system
      summary: Healthz
      description: Lightweight liveness probe — verifies the app can reach the database.
      operationId: healthz_healthz_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /healthz/system:
    get:
      tags:
      - system
      summary: Healthz System
      description: |-
        Unauthenticated aggregated health probe for post-deploy smoke tests.

        Returns boolean status for each subsystem (db, mcp, smtp) plus the
        deployed version, without exposing any sensitive configuration.  Intended
        for CI/monitoring callers that cannot authenticate.  The authenticated
        UI equivalent ``/api/system/health`` returns richer detail for humans.
      operationId: healthz_system_healthz_system_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}

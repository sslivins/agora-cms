openapi: 3.1.0
info:
  title: Agora CMS
  description: Central management system for Agora media playback devices
  version: 1.38.158
paths:
  /api/devices/register:
    post:
      tags:
      - bootstrap
      summary: Register
      description: Device-initiated registration.  Anonymous but fleet-HMAC gated.
      operationId: register_api_devices_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/devices/bootstrap-status:
    get:
      tags:
      - bootstrap
      summary: Bootstrap Status
      description: Poll endpoint the device hits until the operator adopts it.
      operationId: bootstrap_status_api_devices_bootstrap_status_get
      parameters:
      - name: pubkey
        in: query
        required: true
        schema:
          type: string
          title: Pubkey
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapStatusResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/devices/adopt:
    post:
      tags:
      - bootstrap
      summary: Adopt
      description: |-
        Operator-initiated adoption from the CMS UI (QR scanner).

        Coexists with the legacy ``/api/devices/{device_id}/adopt`` — that
        one handles devices that completed the old WS-register flow; this
        one handles devices that came in via the HTTPS bootstrap flow.
      operationId: adopt_api_devices_adopt_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootstrapAdoptRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapAdoptResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/devices/pending:
    get:
      tags:
      - bootstrap
      summary: List Pending
      description: |-
        List every pending (un-adopted) device registration.

        Drives the "Pending Devices" section of the devices page.  Items
        are sorted newest-first so the most recently connected device is
        always on top.
      operationId: list_pending_api_devices_pending_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendingDevicesResponse'
  /api/devices/adopt-pending:
    post:
      tags:
      - bootstrap
      summary: Adopt Pending
      description: |-
        Adopt a pending row by its id.

        Same effect as ``POST /adopt`` with the pairing secret, but the
        admin never sees the secret — it stays on the wire between the
        device and CMS as an idempotency key.
      operationId: adopt_pending_api_devices_adopt_pending_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdoptPendingRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapAdoptResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/devices/pending/{pending_id}:
    delete:
      tags:
      - bootstrap
      summary: Reject Pending
      description: |-
        Reject / drop an un-adopted pending row.

        Useful for cleaning up bogus or duplicate registrations from the
        UI without waiting for the reaper's TTL.  Refuses to delete rows
        that have already been adopted.
      operationId: reject_pending_api_devices_pending__pending_id__delete
      parameters:
      - name: pending_id
        in: path
        required: true
        schema:
          type: string
          title: Pending Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/devices/connect-token:
    post:
      tags:
      - bootstrap
      summary: Connect Token
      description: |-
        Mint a fresh WPS JWT for an adopted device.

        Proof-of-possession of the device's ed25519 private key via a
        signed ``device_id|timestamp|nonce`` canonical string.  Replaces
        the legacy ``GET /api/devices/{id}/client-token`` endpoint that
        relied on the ``X-Device-API-Key`` header.
      operationId: connect_token_api_devices_connect_token_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectTokenRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectTokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /composed/{asset_id}/preview:
    get:
      tags:
      - composed
      summary: Preview Composed Slide
      description: |-
        Live-render the composed slide bound to ``asset_id`` as HTML.

        Returns 404 if the asset doesn't exist or isn't a composed slide.
        Returns 403 if the caller can't see the slide (or any asset it
        references). Returns 422 if the saved layout fails validation, a
        referenced asset is missing / the wrong type, or an inlined video
        exceeds the preview size cap. No disk writes; no row mutations.

        Unlike the publish path (which ships videos as device-local sibling
        cache files), preview inlines every referenced image *and* video as
        a base64 ``data:`` URI so the render works in an editor ``<iframe>``
        under the locked-down preview CSP.
      operationId: preview_composed_slide_composed__asset_id__preview_get
      parameters:
      - name: asset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Asset Id
      responses:
        '200':
          description: Successful Response
          content:
            text/html:
              schema:
                type: string
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /composed/:
    post:
      tags:
      - composed
      summary: Create Composed Slide
      description: |-
        Create a new draft composed-slide asset with an empty layout.

        Body:
            ``name`` (str, required): user-facing display name; also used as
                the unique ``Asset.filename`` (with a numeric suffix if a
                conflict exists).
            ``group_ids`` (list[str] | str, optional): group UUIDs to share
                the asset with. Empty list + admin → global.

        Returns the created asset's id and a redirect-friendly editor URL.
      operationId: create_composed_slide_composed__post
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: true
              type: object
              title: Body
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Create Composed Slide Composed  Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /composed/{asset_id}/layout:
    patch:
      tags:
      - composed
      summary: Patch Composed Layout
      description: |-
        Replace the layout JSON for a composed slide.

        Body must be the full canonical ``Layout`` JSON (Pydantic shape).
        The endpoint:

        1. Validates Pydantic shape — 422 on failure.
        2. Runs ``validate_layout`` (semantic: bounds, unknown
           widget types, per-widget ``validate_semantic``) — 422 on failure.
        3. Checks referenced-asset ACL (audience widening) — 400 on failure.
        4. Persists the canonical JSON via ``layout.model_dump(mode="json")``.
        5. Sets ``is_draft=True`` so any previously-published bundle is
           flagged stale until ``/publish`` is called again.
      operationId: patch_composed_layout_composed__asset_id__layout_patch
      parameters:
      - name: asset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Asset Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              title: Body
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Patch Composed Layout Composed  Asset Id  Layout Patch
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - composed
      summary: Get Composed Layout
      description: |-
        Return the current draft layout in the friendly widget shape.

        Read-only. Widget ``id``s are included so an AI edit can preserve
        widget identity by sending them back unchanged. The locked canvas
        and grid are reported for context but are not editable.
      operationId: get_composed_layout_composed__asset_id__layout_get
      parameters:
      - name: asset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Asset Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Composed Layout Composed  Asset Id  Layout Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /composed/{asset_id}/publish:
    post:
      tags:
      - composed
      summary: Publish Composed Endpoint
      description: |-
        Build the bundle for the composed slide and clear ``is_draft``.

        Returns the bundle filename, size, and sha256. Errors map to:

        * 422 — empty layout (need at least one widget).
        * 422 — bundle/validation error (``PublishError``).
      operationId: publish_composed_endpoint_composed__asset_id__publish_post
      parameters:
      - name: asset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Asset Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Publish Composed Endpoint Composed  Asset Id  Publish Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /composed/widget-types:
    get:
      tags:
      - composed
      summary: List Composed Widget Types
      description: |-
        Return the catalog of available composed-slide widget types.

        Read-only registry introspection. Each entry has the widget's config
        JSON-schema, default config, required fields, and whether it
        references an asset. Powers the AI assistant's widget discovery so
        it never invents a widget type or config field.
      operationId: list_composed_widget_types_composed_widget_types_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response List Composed Widget Types Composed Widget Types Get
  /composed/{asset_id}/layout-friendly:
    put:
      tags:
      - composed
      summary: Put Composed Layout Friendly
      description: |-
        Replace a draft's layout from the friendly widget shape.

        Body: ``{widgets: [...], background_color?: "#rrggbb"}`` where each
        widget is ``{type, row, col, rowspan?, colspan?, config?, id?}``.
        The server assigns/preserves widget UUIDs and pins the locked
        canvas/grid, then runs the exact same shape + semantic + asset-ACL
        validation as the canonical PATCH endpoint. Sets ``is_draft=True``.

        This is the AI-assistant write path: the LLM never has to spell out
        the locked canvas/grid or manage widget UUIDs, which is the source
        of the "extra inputs not permitted" failures it would otherwise hit.
      operationId: put_composed_layout_friendly_composed__asset_id__layout_friendly_put
      parameters:
      - name: asset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Asset Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              title: Body
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Put Composed Layout Friendly Composed  Asset Id  Layout Friendly Put
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /composed/{asset_id}/assistant/thread:
    post:
      tags:
      - composed
      summary: Composed Assistant Thread
      description: |-
        Get-or-create the editor-scoped AI chat thread for this slide.

        Powers the embedded chat panel in the composed-slide editor. The
        thread is bound to ``asset_id`` and runs in ``composed_editor`` mode,
        which scopes the assistant to the composed read/draft-write tools and
        forces every composed tool call onto *this* slide.

        Reuses the caller's newest existing ``composed_editor`` thread for the
        slide if one exists (so reopening the editor resumes the same
        conversation); otherwise creates one. Returns ``{thread_id, created}``.

        Gated identically to the editor itself: requires ``ASSETS_WRITE``,
        that the slide exists and is visible to the caller, and that the
        Assistant feature is enabled for the caller (404 otherwise, to keep
        the hidden feature invisible).
      operationId: composed_assistant_thread_composed__asset_id__assistant_thread_post
      parameters:
      - name: asset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Asset Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Composed Assistant Thread Composed  Asset Id  Assistant Thread Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /composed/rss:
    get:
      tags:
      - composed
      summary: Rss Proxy
      description: |-
        Unauthenticated, SSRF-guarded RSS/Atom feed proxy (CORS-enabled).

        Fetches and parses ``url`` server-side and returns a small JSON
        projection the composed-slide RSS widget can read cross-origin. See
        ``cms.composed.rss_proxy`` for the threat model and guard.

        ``newest`` (default true) orders the returned headlines newest-first;
        pass ``newest=0`` to preserve the feed's own document order.
      operationId: rss_proxy_composed_rss_get
      parameters:
      - name: url
        in: query
        required: true
        schema:
          type: string
          title: Url
      - name: count
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          title: Count
      - name: newest
        in: query
        required: false
        schema:
          type: boolean
          default: true
          title: Newest
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response Rss Proxy Composed Rss Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/devices/check-updates:
    post:
      summary: Check For Updates
      description: Trigger an immediate check for the latest device firmware version.
      operationId: check_for_updates_api_devices_check_updates_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/devices:
    get:
      summary: List Devices
      operationId: list_devices_api_devices_get
      responses:

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Agora CMS{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    {% block nav %}
    <header>
        <div class="nav-brand">Agora CMS</div>
        <div class="header-actions">
            <a href="/settings" class="header-icon has-tooltip" aria-label="Settings"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="3"/><path d="M10 1.5v2M10 16.5v2M3.7 3.7l1.4 1.4M14.9 14.9l1.4 1.4M1.5 10h2M16.5 10h2M3.7 16.3l1.4-1.4M14.9 5.1l1.4-1.4"/></svg><span class="tooltip">Settings</span></a>
            <a href="/logout" class="header-icon has-tooltip" aria-label="Logout"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M7.5 17.5H4.17a1.67 1.67 0 0 1-1.67-1.67V4.17A1.67 1.67 0 0 1 4.17 2.5H7.5M13.33 14.17 17.5 10l-4.17-4.17M17.5 10H7.5"/></svg><span class="tooltip">Logout</span></a>
        </div>
    </header>
    <nav>
        <a href="/" class="nav-tab {% if active_tab == 'dashboard' %}active{% endif %}">Dashboard</a>
        <a href="/devices" class="nav-tab {% if active_tab == 'devices' %}active{% endif %}">Devices</a>
        <a href="/assets" class="nav-tab {% if active_tab == 'assets' %}active{% endif %}">Assets</a>
        <a href="/schedules" class="nav-tab {% if active_tab == 'schedules' %}active{% endif %}">Schedules</a>
        <a href="/history" class="nav-tab {% if active_tab == 'history' %}active{% endif %}">History</a>
    </nav>
    {% endblock %}
    <main>
        {% block content %}{% endblock %}
    </main>
    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>

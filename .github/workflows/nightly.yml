name: Smoke Test

on:
  schedule:
    # 07:00 UTC daily = 00:00 PDT / 23:00 PST
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      keep_stack:
        description: "Leave the compose stack running after tests (for debugging)"
        type: boolean
        default: false
  pull_request:
    branches: [main]
    paths:
      - 'tests/nightly/**'
      - '.github/workflows/nightly.yml'
  # Runs on every main push so it can serve as the pre-deploy gate
  # (Publish & Deploy is triggered off a successful Smoke Test run).
  push:
    branches: [main]

concurrency:
  group: nightly-e2e
  cancel-in-progress: false

jobs:
  nightly-e2e:
    name: Full compose stack E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out agora-cms
        uses: actions/checkout@v4
        with:
          path: agora-cms

      - name: Check out agora-device-simulator (sibling repo)
        uses: actions/checkout@v4
        with:
          repository: sslivins/agora-device-simulator
          path: agora-device-simulator
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            agora-cms/requirements-test.txt
            agora-cms/requirements.txt

      - name: Install test dependencies
        working-directory: agora-cms
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install httpx playwright pytest pillow pillow-heif imageio-ffmpeg
          python -m playwright install --with-deps chromium

      - name: Docker version info
        run: |
          docker --version
          docker compose version

      - name: Run nightly E2E
        working-directory: agora-cms
        env:
          NIGHTLY: "1"
          NIGHTLY_KEEP_STACK: ${{ inputs.keep_stack == true && '1' || '' }}
          NIGHTLY_STARTUP_TIMEOUT: "360"
        run: |
          pytest tests/nightly -v --tb=short -o log_cli=true -o log_cli_level=INFO

      - name: Capture compose logs on failure
        if: failure()
        working-directory: agora-cms
        run: |
          docker compose -p agora-nightly \
            -f docker-compose.yml \
            -f tests/nightly/docker-compose.nightly.yml \
            logs --no-color --tail=2000 > compose-logs-on-failure.txt || true
          docker compose -p agora-nightly \
            -f docker-compose.yml \
            -f tests/nightly/docker-compose.nightly.yml \
            ps >> compose-logs-on-failure.txt || true

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-e2e-logs
          path: |
            agora-cms/tests/nightly/last-run-logs.txt
            agora-cms/compose-logs-on-failure.txt
          if-no-files-found: ignore
          retention-days: 14

      - name: Job summary
        if: always()
        working-directory: agora-cms
        run: |
          {
            echo "## Nightly E2E result: ${{ job.status }}"
            echo ""
            echo "- Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo "- Triggered by: ${{ github.event_name }}"
            echo ""
            if [ -f tests/nightly/last-run-logs.txt ]; then
              echo "Compose logs captured in artifact \`nightly-e2e-logs\` (\`last-run-logs.txt\`)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

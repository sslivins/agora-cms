name: Build and Publish .deb

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .deb package
        run: bash packaging/build-deb.sh "${{ steps.version.outputs.version }}"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: agora-deb
          path: build/*.deb

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.deb
          generate_release_notes: true

  publish-apt:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
        continue-on-error: true

      - name: Initialize gh-pages if needed
        run: |
          if [ ! -f index.html ]; then
            git checkout --orphan gh-pages 2>/dev/null || true
            git rm -rf . 2>/dev/null || true
            echo "<html><body><h1>Agora APT Repository</h1><p>See README for usage.</p></body></html>" > index.html
            mkdir -p pool dists/stable/main/binary-arm64
          fi

      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: agora-deb
          path: pool/

      - name: Generate APT repository metadata
        run: |
          cd $GITHUB_WORKSPACE

          # Generate Packages file
          dpkg-scanpackages --arch arm64 pool/ > dists/stable/main/binary-arm64/Packages
          gzip -kf dists/stable/main/binary-arm64/Packages

          # Generate Release file
          cd dists/stable
          cat > Release <<EOF
          Origin: sslivins
          Label: Agora
          Suite: stable
          Codename: stable
          Architectures: arm64
          Components: main
          Description: Agora media playback system for Raspberry Pi
          EOF
          # Add checksums
          apt-ftparchive release . >> Release

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update apt repo: ${{ github.ref_name }}"
          git push origin gh-pages

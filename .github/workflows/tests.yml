name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          # BtbN static build — includes libsvtav1, libaom-av1, libx265, libopus, etc.
          ARCH=$(dpkg --print-architecture)
          case "$ARCH" in
            arm64|aarch64) FFARCH=linuxarm64 ;;
            *)             FFARCH=linux64 ;;
          esac
          curl -sL "https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-2026-04-06-13-14/ffmpeg-n8.1-7-ga3475e2554-${FFARCH}-gpl-8.1.tar.xz" | \
            sudo tar -xJ --strip-components=1 -C /usr/local
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libheif-examples libheif-plugin-x265

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-timeout httpx aiosqlite

      - name: Run tests
        run: python -m pytest tests/ --tb=short -q -rs

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-e2e.txt

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(pip show playwright | grep Version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw-version.outputs.version }}-chromium

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: Install Playwright system deps only
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Run E2E tests
        run: python -m pytest tests_e2e/ --tb=short -q

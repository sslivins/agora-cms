name: Tests

on:
  pull_request:
    branches: [main]
  workflow_call:

# Cancel any in-flight run on the same ref when a new commit lands.
# Saves CI minutes when devs push fix-ups to a PR that already had a
# long-running test job underway. ``cancel-in-progress: true`` is
# safe here because we never care about an intermediate commit's
# result once a newer one exists -- the newer commit's run supersedes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether the PR touches code/tests that warrant running the
  # unit and e2e suites. Pure docs/nightly/workflow-only PRs skip the
  # expensive jobs, but the ci-gate umbrella job at the bottom always
  # runs so branch protection has a required context to key off of.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code: ${{ steps.filter.outputs.code }}
      broker: ${{ steps.filter.outputs.broker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'cms/**'
              - 'shared/**'
              - 'alembic/**'
              - 'tests/**'
              - '!tests/nightly/**'
              - 'tests_e2e/**'
              - 'pyproject.toml'
              - 'requirements*.txt'
              - '.github/workflows/tests.yml'
              - 'Dockerfile'
            broker:
              - 'local-broker/**'
              - '.github/workflows/tests.yml'

  # Early-warning job: runs ONLY the test files changed in this PR,
  # sequentially with -x (fail-fast), no coverage, no xdist overhead.
  # Goal: surface failures in newly added / edited tests in 1-3 min
  # instead of waiting ~30 min for the full xdist suite. Mirrors the
  # ``test`` job's environment (postgres service + ffmpeg + libheif)
  # so a green result here genuinely predicts a green result there
  # for the same files.
  #
  # NOT added to ci-gate -- the full ``test`` job remains the required
  # check. This is purely a developer-feedback signal.
  tests-changed:
    name: tests-changed (early-warning)
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agora_test
          POSTGRES_PASSWORD: agora_test
          POSTGRES_DB: agora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agora_test -d agora_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AGORA_CMS_DATABASE_URL: postgresql+asyncpg://agora_test:agora_test@localhost:5432/agora_test
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history for ``git diff`` against the PR base ref.
          fetch-depth: 0

      - name: Determine changed test files
        id: changed
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if [ -z "$BASE_SHA" ]; then
            echo "No PR base SHA; skipping."
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Three-dot: tests in HEAD that differ from the merge-base
          # with base (i.e. only what THIS PR adds/changes, not
          # everything ``main`` has moved on since branch).
          FILES=$(git diff --name-only --diff-filter=AM "$BASE_SHA"...HEAD -- 'tests/**/*.py' 'tests_e2e/**/*.py' \
            | grep -v '^tests/nightly/' \
            | grep -v '^tests/e2e/' \
            | grep -v '^tests_e2e/' \
            | tr '\n' ' ' \
            | sed 's/[[:space:]]*$//')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          if [ -z "$FILES" ]; then
            echo "No changed unit-test files in this PR."
          else
            echo "Changed test files:"
            for f in $FILES; do echo "  - $f"; done
          fi

      - name: Skip if no changed test files
        if: steps.changed.outputs.files == ''
        run: echo "Nothing to run. Full ``test`` job will still execute."

      - uses: actions/setup-python@v5
        if: steps.changed.outputs.files != ''
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-shared.txt

      # See the ``test`` job for why Node is pinned here (inline-JS
      # template syntax guard runs ``node --check``).
      - uses: actions/setup-node@v4
        if: steps.changed.outputs.files != ''
        with:
          node-version: "20"

      - name: Cache FFmpeg
        if: steps.changed.outputs.files != ''
        id: ffmpeg-cache
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/ffmpeg
            /usr/local/bin/ffprobe
          key: ffmpeg-8.1-${{ runner.arch }}

      - name: Install FFmpeg
        if: steps.changed.outputs.files != '' && steps.ffmpeg-cache.outputs.cache-hit != 'true'
        run: |
          ARCH=$(dpkg --print-architecture)
          case "$ARCH" in
            arm64|aarch64) FFARCH=linuxarm64 ;;
            *)             FFARCH=linux64 ;;
          esac
          curl -fSL "https://github.com/sslivins/agora-cms/releases/download/ffmpeg-8.1/ffmpeg-${FFARCH}.tar.xz" | \
            sudo tar -xJ --strip-components=1 -C /usr/local

      - name: Install system dependencies
        if: steps.changed.outputs.files != ''
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libheif-examples libheif-plugin-x265 mtools parted xz-utils

      - name: Install dependencies
        if: steps.changed.outputs.files != ''
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-timeout pytest-cov pytest-xdist httpx aiosqlite psycopg2-binary

      - name: Run changed tests (fail-fast, sequential, no coverage)
        if: steps.changed.outputs.files != ''
        run: |
          python -m pytest ${{ steps.changed.outputs.files }} \
            -x -p no:xdist -p no:timeout \
            --tb=short -q -rs

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agora_test
          POSTGRES_PASSWORD: agora_test
          POSTGRES_DB: agora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agora_test -d agora_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AGORA_CMS_DATABASE_URL: postgresql+asyncpg://agora_test:agora_test@localhost:5432/agora_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-shared.txt

      # Needed by tests/test_template_inline_js_syntax.py, which runs
      # ``node --check`` on every template's inline <script>. Pinned
      # rather than relying on the runner's bundled Node so the guard
      # can't silently skip if that default changes.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache FFmpeg
        id: ffmpeg-cache
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/ffmpeg
            /usr/local/bin/ffprobe
          key: ffmpeg-8.1-${{ runner.arch }}

      - name: Install FFmpeg
        if: steps.ffmpeg-cache.outputs.cache-hit != 'true'
        run: |
          ARCH=$(dpkg --print-architecture)
          case "$ARCH" in
            arm64|aarch64) FFARCH=linuxarm64 ;;
            *)             FFARCH=linux64 ;;
          esac
          curl -fSL "https://github.com/sslivins/agora-cms/releases/download/ffmpeg-8.1/ffmpeg-${FFARCH}.tar.xz" | \
            sudo tar -xJ --strip-components=1 -C /usr/local

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libheif-examples libheif-plugin-x265 mtools parted xz-utils

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-timeout pytest-cov pytest-xdist httpx aiosqlite psycopg2-binary

      - name: Run tests
        run: python -m pytest tests/ --ignore=tests/e2e -n auto --dist=loadfile --tb=short -q -rs --durations=20 --cov=cms --cov=shared --cov-report=xml --cov-report=term --cov-fail-under=50

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 14

  # Verify docs/openapi.yaml is in sync with the live FastAPI route table.
  # Generated by ``python scripts/generate_openapi.py`` -- if a PR changes a
  # route or response schema without regenerating, this job fails and points
  # at the exact diff.
  openapi-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-shared.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate docs/openapi.yaml
        run: python scripts/generate_openapi.py

      - name: Verify spec is in sync with code
        run: |
          if ! git diff --exit-code docs/openapi.yaml; then
            echo "::error::docs/openapi.yaml is out of sync with the FastAPI route table."
            echo "::error::Run 'python scripts/generate_openapi.py' and commit the result."
            exit 1
          fi

  e2e:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agora_test
          POSTGRES_PASSWORD: agora_test
          POSTGRES_DB: agora_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agora_test -d agora_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AGORA_CMS_DATABASE_URL: postgresql+asyncpg://agora_test:agora_test@localhost:5432/agora_e2e
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-e2e.txt
            requirements-shared.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-e2e.txt

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(pip show playwright | grep Version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw-version.outputs.version }}-chromium

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: Install Playwright system deps only
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Wait for PostgreSQL database
        run: |
          for i in $(seq 1 30); do
            if PGPASSWORD=agora_test psql -h localhost -U agora_test -d agora_e2e -c 'SELECT 1' >/dev/null 2>&1; then
              echo "✅ Database agora_e2e ready (attempt $i)"
              exit 0
            fi
            echo "Waiting for database... (attempt $i)"
            sleep 2
          done
          echo "❌ Database not ready after 60s"
          exit 1

      - name: Run E2E tests
        run: python -m pytest tests_e2e/ --tb=short -q --timeout=60 --reruns=2 --reruns-delay=3 --only-rerun="RemoteProtocolError|ConnectError"

  broker-test:
    needs: changes
    if: needs.changes.outputs.broker == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-broker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: local-broker/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run broker tests
        run: python -m pytest tests/ -v --tb=short

  # Multi-replica smoke subset. Spins up the compose harness and runs
  # the ``smoke``-marked integration tests: both replicas answer an
  # authenticated GET, exactly one live leader per critical loop
  # (scheduler, offline_sweep), skip written on B is visible via A,
  # and concurrent upgrades hit the atomic claim. Wired into
  # ci-gate so a cross-replica regression blocks merge.
  multireplica-smoke:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install host-side test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt

      - name: Run multi-replica smoke tests
        env:
          AGORA_RUN_INTEGRATION: "1"
        run: |
          # Fixture owns the compose lifecycle (up + healthz + leader
          # poll + down). ``-m smoke`` restricts to the required
          # subset; non-smoke integration tests (when they land) run
          # elsewhere.
          pytest tests/integration/ \
            --run-integration \
            -m smoke \
            -p no:xdist -p no:timeout \
            -v --tb=short

      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose -f tests/integration/docker-compose.integration.yml logs \
            --no-color --tail=500 || true

      - name: Tear down
        if: always()
        run: |
          docker compose -f tests/integration/docker-compose.integration.yml \
            down -v --remove-orphans || true

  # Multi-replica + WPS-transport smoke. Same harness as
  # ``multireplica-smoke`` but layered with the WPS overlay so both
  # cms replicas run ``AGORA_CMS_DEVICE_TRANSPORT=wps`` against a
  # local-broker pinned at cms-0. Closes the Stage-4 coverage gap:
  # prod runs N=2 + WPS, but the existing smoke job only exercises
  # N=2 + direct-WS. Runs the same ``-m smoke`` cluster-health gate
  # under WPS plus the dedicated ``-m smoke_wps`` synthetic
  # cross-replica webhook tests in
  # ``tests/integration/test_multireplica_wps_smoke.py``.
  multireplica-wps-smoke:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install host-side test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt

      - name: Run multi-replica WPS smoke tests
        env:
          AGORA_RUN_INTEGRATION: "1"
          # conftest reads this and layers the WPS overlay on top of
          # the base integration compose file (local-broker + cms env
          # flips). Without it the harness comes up direct-WS.
          AGORA_INTEGRATION_TRANSPORT: "wps"
        run: |
          # Single pytest invocation so the session-scoped compose
          # fixture brings the stack up exactly once. ``smoke``
          # re-validates cluster health under WPS (catches transport-
          # specific boot/auth/leader regressions); ``smoke_wps`` runs
          # the cross-replica synthetic webhook coverage.
          pytest tests/integration/ \
            --run-integration \
            -m "smoke or smoke_wps" \
            -p no:xdist -p no:timeout \
            -v --tb=short

      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose \
            -f tests/integration/docker-compose.integration.yml \
            -f tests/integration/docker-compose.integration.wps.yml \
            logs --no-color --tail=500 || true

      - name: Tear down
        if: always()
        run: |
          docker compose \
            -f tests/integration/docker-compose.integration.yml \
            -f tests/integration/docker-compose.integration.wps.yml \
            down -v --remove-orphans || true

  # Umbrella check that branch protection requires. Runs on every PR so
  # it always reports a status. Passes iff every upstream job is either
  # success or skipped (path-filtered out); fails on failure/cancelled.
  # Keeps tests-only PRs unblocked while still catching real breakage.
  ci-gate:
    name: ci-gate
    needs: [changes, test, e2e, broker-test, multireplica-smoke, multireplica-wps-smoke, openapi-check]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify upstream results
        run: |
          echo "changes=${{ needs.changes.result }}"
          echo "test=${{ needs.test.result }}"
          echo "e2e=${{ needs.e2e.result }}"
          echo "broker-test=${{ needs.broker-test.result }}"
          echo "multireplica-smoke=${{ needs.multireplica-smoke.result }}"
          echo "multireplica-wps-smoke=${{ needs.multireplica-wps-smoke.result }}"
          echo "openapi-check=${{ needs.openapi-check.result }}"
          fail=0
          for r in "${{ needs.changes.result }}" "${{ needs.test.result }}" "${{ needs.e2e.result }}" "${{ needs.broker-test.result }}" "${{ needs.multireplica-smoke.result }}" "${{ needs.multireplica-wps-smoke.result }}" "${{ needs.openapi-check.result }}"; do
            case "$r" in
              success|skipped) ;;
              *) fail=1 ;;
            esac
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::Upstream job failed or was cancelled."
            exit 1
          fi
          echo "All upstream jobs succeeded or were skipped."

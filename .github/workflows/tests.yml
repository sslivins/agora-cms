name: Tests

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'tests/nightly/**'
      - 'docs/**'
      - 'README*'
      - 'LICENSE'
      - '.gitignore'
      - '.github/workflows/nightly.yml'
      - '.github/workflows/ci-gate.yml'
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agora_test
          POSTGRES_PASSWORD: agora_test
          POSTGRES_DB: agora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agora_test -d agora_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AGORA_CMS_DATABASE_URL: postgresql+asyncpg://agora_test:agora_test@localhost:5432/agora_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-shared.txt

      - name: Cache FFmpeg
        id: ffmpeg-cache
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/ffmpeg
            /usr/local/bin/ffprobe
          key: ffmpeg-8.1-${{ runner.arch }}

      - name: Install FFmpeg
        if: steps.ffmpeg-cache.outputs.cache-hit != 'true'
        run: |
          ARCH=$(dpkg --print-architecture)
          case "$ARCH" in
            arm64|aarch64) FFARCH=linuxarm64 ;;
            *)             FFARCH=linux64 ;;
          esac
          curl -fSL "https://github.com/sslivins/agora-cms/releases/download/ffmpeg-8.1/ffmpeg-${FFARCH}.tar.xz" | \
            sudo tar -xJ --strip-components=1 -C /usr/local

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libheif-examples libheif-plugin-x265

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-timeout pytest-cov httpx aiosqlite

      - name: Run tests
        run: python -m pytest tests/ --ignore=tests/e2e --tb=short -q -rs --durations=20 --cov=cms --cov=shared --cov-report=xml --cov-report=term --cov-fail-under=50

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 14

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agora_test
          POSTGRES_PASSWORD: agora_test
          POSTGRES_DB: agora_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agora_test -d agora_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AGORA_CMS_DATABASE_URL: postgresql+asyncpg://agora_test:agora_test@localhost:5432/agora_e2e
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-e2e.txt
            requirements-shared.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-e2e.txt

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(pip show playwright | grep Version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw-version.outputs.version }}-chromium

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: Install Playwright system deps only
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Wait for PostgreSQL database
        run: |
          for i in $(seq 1 30); do
            if PGPASSWORD=agora_test psql -h localhost -U agora_test -d agora_e2e -c 'SELECT 1' >/dev/null 2>&1; then
              echo "✅ Database agora_e2e ready (attempt $i)"
              exit 0
            fi
            echo "Waiting for database... (attempt $i)"
            sleep 2
          done
          echo "❌ Database not ready after 60s"
          exit 1

      - name: Run E2E tests
        run: python -m pytest tests_e2e/ --tb=short -q --timeout=60 --reruns=2 --reruns-delay=3 --only-rerun="RemoteProtocolError|ConnectError"

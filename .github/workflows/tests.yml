name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agora_test
          POSTGRES_PASSWORD: agora_test
          POSTGRES_DB: agora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agora_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      AGORA_CMS_DATABASE_URL: postgresql+asyncpg://agora_test:agora_test@localhost:5432/agora_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          # FFmpeg static build hosted in our own repo release (originally from BtbN/FFmpeg-Builds)
          ARCH=$(dpkg --print-architecture)
          case "$ARCH" in
            arm64|aarch64) FFARCH=linuxarm64 ;;
            *)             FFARCH=linux64 ;;
          esac
          curl -fSL "https://github.com/sslivins/agora-cms/releases/download/ffmpeg-8.1/ffmpeg-${FFARCH}.tar.xz" | \
            sudo tar -xJ --strip-components=1 -C /usr/local
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libheif-examples libheif-plugin-x265

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-timeout httpx

      - name: Run tests
        run: python -m pytest tests/ --ignore=tests/e2e --tb=short -q -rs

  e2e:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agora_test
          POSTGRES_PASSWORD: agora_test
          POSTGRES_DB: agora_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agora_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      AGORA_CMS_DATABASE_URL: postgresql+asyncpg://agora_test:agora_test@localhost:5432/agora_e2e
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-e2e.txt

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(pip show playwright | grep Version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw-version.outputs.version }}-chromium

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: Install Playwright system deps only
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Run E2E tests
        run: python -m pytest tests_e2e/ --tb=short -q

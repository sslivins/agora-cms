name: Migration Safety

# Catches migrations that break against a populated database — the kind
# of issue that a fresh-DB test suite cannot surface.
#
# Always runs on every PR to main (no path filter). This check is a
# required-status in branch protection, and GitHub only considers a
# required check "satisfied" when it actually reports a conclusion; a
# path-filtered workflow that never runs blocks auto-merge on PRs that
# happen to only touch ignored paths (e.g. nightly-only PRs).
#
# Strategy:
#   1. Check out main into a sibling dir.
#   2. Using main's code, initialise the schema and seed a synthetic
#      dataset (~10 rows per major table).
#   3. Switch to the PR's code and run run_migrations() against the
#      populated database.
#   4. Run the post-migration verification script (row counts survive,
#      relational queries still execute).

on:
  pull_request:
    branches: [main]

jobs:
  migration-safety:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agora_test
          POSTGRES_PASSWORD: agora_test
          POSTGRES_DB: agora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agora_test -d agora_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AGORA_CMS_DATABASE_URL: postgresql+asyncpg://agora_test:agora_test@localhost:5432/agora_test
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          path: pr

      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          path: base

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install base (main) dependencies
        working-directory: base
        run: |
          pip install -r requirements.txt

      # Copy scripts that live only on the PR branch into main's tree so
      # they're available when running against the baseline.
      - name: Stage PR-only scripts into base
        run: |
          mkdir -p base/scripts
          cp pr/scripts/ci_seed_synthetic.py base/scripts/ci_seed_synthetic.py
          cp pr/scripts/ci_capture_row_counts.py base/scripts/ci_capture_row_counts.py

      - name: Initialise schema + seed synthetic data (using main's code)
        working-directory: base
        env:
          PYTHONPATH: ${{ github.workspace }}/base
        run: python scripts/ci_seed_synthetic.py

      # Snapshot row counts on the seeded baseline BEFORE running the PR
      # branch's migrations.  After the migrations run, the verify step
      # compares current counts against this file and fails if any table
      # shrank — catching destructive forward migrations.
      - name: Capture baseline row counts (pre-migration)
        working-directory: base
        env:
          PYTHONPATH: ${{ github.workspace }}/base
        run: python scripts/ci_capture_row_counts.py ${{ github.workspace }}/baseline-counts.json

      - name: Install PR branch dependencies
        working-directory: pr
        run: |
          pip install -r requirements.txt --upgrade

      - name: Run PR branch migrations against populated database
        working-directory: pr
        env:
          PYTHONPATH: ${{ github.workspace }}/pr
        run: |
          python - <<'PY'
          import asyncio
          from cms.auth import get_settings
          from cms.database import dispose_db, init_db, run_migrations, wait_for_db

          async def main():
              init_db(get_settings())
              await wait_for_db()
              await run_migrations()
              await dispose_db()

          asyncio.run(main())
          PY

      - name: Verify populated DB survived branch migrations
        working-directory: pr
        env:
          PYTHONPATH: ${{ github.workspace }}/pr
        run: python scripts/ci_verify_post_migration.py ${{ github.workspace }}/baseline-counts.json

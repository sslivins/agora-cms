name: Publish & Deploy

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write  # OIDC token for Azure login

env:
  ACR_REGISTRY: agoracmsacr.azurecr.io
  AZURE_RESOURCE_GROUP: agora-cms-w3

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          version=$(python3 -c "exec(open('cms/__init__.py').read()); print(__version__)")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # ── GHCR (public images) ──
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CMS to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/sslivins/agora-cms:latest
            ghcr.io/sslivins/agora-cms:${{ steps.version.outputs.version }}

      - name: Build and push MCP to GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./mcp
          push: true
          tags: |
            ghcr.io/sslivins/agora-cms-mcp:latest
            ghcr.io/sslivins/agora-cms-mcp:${{ steps.version.outputs.version }}

      # ── ACR (Azure deployment) ──
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name agoracmsacr

      - name: Push CMS image to ACR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/agora-cms:latest
            ${{ env.ACR_REGISTRY }}/agora-cms:${{ steps.version.outputs.version }}

      - name: Push MCP image to ACR
        uses: docker/build-push-action@v6
        with:
          context: ./mcp
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/agora-cms-mcp:latest
            ${{ env.ACR_REGISTRY }}/agora-cms-mcp:${{ steps.version.outputs.version }}

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy CMS container
        run: |
          az containerapp update \
            --name agoracms-cms \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_REGISTRY }}/agora-cms:${{ needs.publish.outputs.version }}

      - name: Deploy MCP container
        run: |
          az containerapp update \
            --name agoracms-mcp \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_REGISTRY }}/agora-cms-mcp:${{ needs.publish.outputs.version }}

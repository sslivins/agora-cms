name: Publish Docker Image

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          version=$(python3 -c "exec(open('cms/__init__.py').read()); print(__version__)")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/sslivins/agora-cms:latest
            ghcr.io/sslivins/agora-cms:${{ steps.version.outputs.version }}

name: Publish & Deploy

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write  # OIDC token for Azure login

env:
  ACR_REGISTRY: agoracmsacr.azurecr.io
  AZURE_RESOURCE_GROUP: agoracms-cms-rg

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          version=$(python3 -c "exec(open('cms/__init__.py').read()); print(__version__)")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # ── GHCR (public images) ──
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CMS to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/sslivins/agora-cms:latest
            ghcr.io/sslivins/agora-cms:${{ steps.version.outputs.version }}

      - name: Build and push MCP to GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./mcp
          push: true
          tags: |
            ghcr.io/sslivins/agora-cms-mcp:latest
            ghcr.io/sslivins/agora-cms-mcp:${{ steps.version.outputs.version }}

      # ── ACR (Azure deployment) ──
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name agoracmsacr

      - name: Push CMS image to ACR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/agora-cms:latest
            ${{ env.ACR_REGISTRY }}/agora-cms:${{ steps.version.outputs.version }}

      - name: Push MCP image to ACR
        uses: docker/build-push-action@v6
        with:
          context: ./mcp
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/agora-cms-mcp:latest
            ${{ env.ACR_REGISTRY }}/agora-cms-mcp:${{ steps.version.outputs.version }}

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy CMS container
        run: |
          az containerapp update \
            --name agoracms-cms \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_REGISTRY }}/agora-cms:${{ needs.publish.outputs.version }}

      - name: Deploy MCP container
        run: |
          az containerapp update \
            --name agoracms-mcp \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_REGISTRY }}/agora-cms-mcp:${{ needs.publish.outputs.version }}

      - name: Wait for CMS to become healthy
        run: |
          FQDN=$(az containerapp show \
            --name agoracms-cms \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          URL="https://${FQDN}/healthz"
          echo "Polling $URL for up to 120s ..."
          for i in $(seq 1 24); do
            CODE=$(curl -s -o /tmp/health.json -w '%{http_code}' "$URL" --max-time 5 || echo "000")
            if [ "$CODE" = "200" ]; then
              VERSION=$(cat /tmp/health.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('version','?'))")
              echo "✅ CMS healthy — version $VERSION (attempt $i)"
              if [ "$VERSION" != "${{ needs.publish.outputs.version }}" ]; then
                echo "⚠️  Expected version ${{ needs.publish.outputs.version }} but got $VERSION"
              fi
              exit 0
            fi
            echo "  attempt $i — HTTP $CODE, retrying in 5s ..."
            sleep 5
          done
          echo "❌ CMS failed to become healthy within 120s"
          echo "Last response:"
          cat /tmp/health.json 2>/dev/null || echo "(no response body)"
          exit 1

name: Publish & Deploy

on:
  workflow_run:
    workflows: [Smoke Test]
    types: [completed]
    branches: [main]

concurrency:
  group: publish-deploy
  cancel-in-progress: false

permissions:
  contents: write          # needed to push the auto-bump commit back to main
  packages: write
  id-token: write  # OIDC token for Azure login

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      cms_digest: ${{ steps.ghcr_cms.outputs.digest }}
      mcp_digest: ${{ steps.ghcr_mcp.outputs.digest }}
      worker_digest: ${{ steps.ghcr_worker.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute next version
        id: version
        run: |
          # Read current version from main…
          current=$(python3 -c "exec(open('cms/__init__.py').read()); print(__version__)")
          # …and bump the patch component.
          IFS=. read -r major minor patch <<< "$current"
          next="${major}.${minor}.$((patch + 1))"
          echo "current=$current"
          echo "next=$next"
          echo "version=$next" >> "$GITHUB_OUTPUT"
          # Write the bumped version into the working tree so the Docker
          # images bake it in (/healthz will report $next).  The commit
          # back to main happens in the bump-main job after verify succeeds.
          sed -i "s/^__version__ = .*/__version__ = \"$next\"/" cms/__init__.py
          grep __version__ cms/__init__.py

      # ── GHCR (public images) ──
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CMS to GHCR
        id: ghcr_cms
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/sslivins/agora-cms:latest
            ghcr.io/sslivins/agora-cms:${{ steps.version.outputs.version }}

      - name: Build and push MCP to GHCR
        id: ghcr_mcp
        uses: docker/build-push-action@v6
        with:
          context: ./mcp
          push: true
          tags: |
            ghcr.io/sslivins/agora-cms-mcp:latest
            ghcr.io/sslivins/agora-cms-mcp:${{ steps.version.outputs.version }}

      - name: Build and push Worker to GHCR
        id: ghcr_worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            ghcr.io/sslivins/agora-worker:latest
            ghcr.io/sslivins/agora-worker:${{ steps.version.outputs.version }}

      # Deploy-gate the worker image by exercising every top-level
      # import the queue dispatcher pulls in.  worker/__main__.py
      # imports worker.imager_handlers lazily inside _queue_mode so a
      # plain "python -m worker --help" wouldn't catch a missing dep
      # in shared/ or worker/ -- production has already paid the cost
      # of finding such gaps the hard way (see hotfix/worker-httpx-
      # missing).  Force the imports here.
      - name: Smoke-test worker image imports
        run: |
          set -euo pipefail
          docker pull ghcr.io/sslivins/agora-worker:${{ steps.version.outputs.version }}
          docker run --rm --entrypoint python \
            ghcr.io/sslivins/agora-worker:${{ steps.version.outputs.version }} \
            -c "import worker.__main__, worker.imager_handlers, worker.transcoder; \
                from worker.imager_handlers import import_base_image_by_id, provision_image_by_id; \
                print('worker image imports OK')"

      # Verify OS-level tools required by ``cms.services.imager`` are
      # present in the final worker image.  The Python import smoke
      # above will not catch a missing ``parted``/``mcopy``/``xz`` --
      # those are discovered at runtime via ``shutil.which`` the first
      # time an imager job runs.  Without this gate we ship workers
      # that import cleanly but blow up on every IMAGE_IMPORT /
      # IMAGE_PROVISION job (see hotfix/worker-imager-scratch-path).
      - name: Smoke-test worker image runtime tools
        run: |
          set -euo pipefail
          docker run --rm --entrypoint python \
            ghcr.io/sslivins/agora-worker:${{ steps.version.outputs.version }} \
            -c "from cms.services.imager import _Tools; t = _Tools.discover(); \
                print(f'worker image imager tools OK: parted={t.parted} mcopy={t.mcopy} xz={t.xz}')"

      - name: Record image digests
        run: |
          echo "CMS digest:    ${{ steps.ghcr_cms.outputs.digest }}"
          echo "MCP digest:    ${{ steps.ghcr_mcp.outputs.digest }}"
          echo "Worker digest: ${{ steps.ghcr_worker.outputs.digest }}"

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    environment: production
    outputs:
      revision_suffix: ${{ steps.revisions.outputs.revision_suffix }}
      previous_cms_revision: ${{ steps.revisions.outputs.previous_cms_revision }}
      previous_mcp_revision: ${{ steps.revisions.outputs.previous_mcp_revision }}
      new_cms_revision: ${{ steps.revisions.outputs.new_cms_revision }}
      new_mcp_revision: ${{ steps.revisions.outputs.new_mcp_revision }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Idempotent infrastructure deploy — creates new resources (queues,
      # worker jobs, etc.) and updates existing ones to match Bicep definitions.
      # Safe to run on every deploy; Bicep only changes what's different.
      #
      # Images are pinned by immutable content digest (registry@sha256:...)
      # rather than by tag.  This guarantees that:
      #   * ACA always sees a new image reference and rolls a fresh revision
      #     (no more "same tag, stale revision" failures).
      #   * A mutated/overwritten tag can never cause an unexpected image
      #     to be deployed.

      # Blue/green: capture the currently-serving revisions before we deploy.
      # Bicep pins traffic 100% to these names so the brand-new revision lands
      # at 0% and is only reached via its per-revision FQDN until verify
      # passes. On bootstrap (apps don't exist yet, or first deploy in
      # multi-revision mode) the names come back empty and Bicep falls back
      # to "100% latest" so the very first revision can serve traffic.
      - name: Capture pre-deploy revision state
        id: revisions
        run: |
          set -euo pipefail
          CMS_APP="${{ vars.INFRA_PREFIX }}-cms"
          MCP_APP="${{ vars.INFRA_PREFIX }}-mcp"
          RG="${{ env.AZURE_RESOURCE_GROUP }}"

          fetch_prev() {
            local app="$1"
            # The previous revision we want to keep traffic on while the new
            # one warms up. We can't use latestReadyRevisionName because it
            # can point at a deactivated revision; bicep would then pin
            # traffic at that name and ACA will eventually GC it, leaving
            # ingress pointed at a phantom (this bit us on the 1.37.188
            # deploy — `mcp--v1-37-187` had been deactivated as part of
            # an earlier recovery, but `latestReadyRevisionName` still
            # reported it, so bicep set traffic = 187:100 / 189:0 and
            # 189 was later GC'd because it had 0% traffic).
            #
            # Instead, list revisions and pick the most recently created
            # one that is still active and healthy. Falls back to empty
            # (bootstrap) when nothing qualifies, e.g. on a fresh app.
            az containerapp revision list --name "$app" --resource-group "$RG" \
              --query "reverse(sort_by([?properties.active && properties.healthState=='Healthy'], &properties.createdTime))[0].name" \
              -o tsv 2>/dev/null || true
          }

          PREV_CMS=$(fetch_prev "$CMS_APP")
          PREV_MCP=$(fetch_prev "$MCP_APP")
          echo "previous_cms_revision=${PREV_CMS}" >> "$GITHUB_OUTPUT"
          echo "previous_mcp_revision=${PREV_MCP}" >> "$GITHUB_OUTPUT"
          echo "  cms previous: ${PREV_CMS:-<bootstrap>}"
          echo "  mcp previous: ${PREV_MCP:-<bootstrap>}"

          # ACA revision suffixes must be lowercase alphanumeric with dashes,
          # max 64 chars. Versions look like "1.12.34" -> "v1-12-34".
          SUFFIX="v$(echo '${{ needs.publish.outputs.version }}' | tr '.' '-')"
          echo "revision_suffix=${SUFFIX}" >> "$GITHUB_OUTPUT"
          echo "  new revision suffix: ${SUFFIX}"

          # Compute the new revision names for the verify step.
          echo "new_cms_revision=${CMS_APP}--${SUFFIX}" >> "$GITHUB_OUTPUT"
          echo "new_mcp_revision=${MCP_APP}--${SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Deploy infrastructure
        run: |
          CMS_REF='ghcr.io/sslivins/agora-cms@${{ needs.publish.outputs.cms_digest }}'
          MCP_REF='ghcr.io/sslivins/agora-cms-mcp@${{ needs.publish.outputs.mcp_digest }}'
          WORKER_REF='ghcr.io/sslivins/agora-worker@${{ needs.publish.outputs.worker_digest }}'
          echo "Deploying:"
          echo "  cms:    $CMS_REF"
          echo "  mcp:    $MCP_REF"
          echo "  worker: $WORKER_REF"
          az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters \
              prefix='${{ vars.INFRA_PREFIX }}' \
              postgresAdminPassword='${{ secrets.POSTGRES_ADMIN_PASSWORD }}' \
              cmsSecretKey='${{ secrets.CMS_SECRET_KEY }}' \
              cmsAdminPassword='${{ secrets.CMS_ADMIN_PASSWORD }}' \
              githubIssuesToken='${{ secrets.AGORA_CMS_ISSUES_TOKEN }}' \
              adminPrincipalId='${{ secrets.ADMIN_PRINCIPAL_ID }}' \
              deployRoleAssignments=false \
              cmsImage="$CMS_REF" \
              mcpImage="$MCP_REF" \
              workerImage="$WORKER_REF" \
              cmsRevisionSuffix='${{ steps.revisions.outputs.revision_suffix }}' \
              previousCmsRevisionName='${{ steps.revisions.outputs.previous_cms_revision }}' \
              mcpRevisionSuffix='${{ steps.revisions.outputs.revision_suffix }}' \
              previousMcpRevisionName='${{ steps.revisions.outputs.previous_mcp_revision }}' \
              alertEmail='${{ vars.ALERT_EMAIL }}'

      - name: Bind custom domains (if configured)
        if: vars.CMS_CUSTOM_DOMAIN != '' || vars.MCP_CUSTOM_DOMAIN != ''
        run: |
          ENV_NAME="${{ vars.INFRA_PREFIX }}-env"
          RG="${{ env.AZURE_RESOURCE_GROUP }}"

          bind_domain() {
            local APP_NAME="$1" DOMAIN="$2"
            [ -z "$DOMAIN" ] && return 0

            # Check if already bound with cert
            BINDING=$(az containerapp hostname list --name "$APP_NAME" --resource-group "$RG" \
              --query "[?name=='$DOMAIN'].bindingType" -o tsv 2>/dev/null)
            if [ "$BINDING" = "SniEnabled" ]; then
              echo "✅ $DOMAIN already bound with cert to $APP_NAME"
              return 0
            fi

            # Step 1: Add hostname to app (creates unbound entry)
            echo "Adding hostname $DOMAIN to $APP_NAME..."
            az containerapp hostname add \
              --name "$APP_NAME" \
              --resource-group "$RG" \
              --hostname "$DOMAIN" 2>/dev/null || true

            # Step 2: Bind with managed certificate
            echo "Binding managed certificate for $DOMAIN..."
            az containerapp hostname bind \
              --name "$APP_NAME" \
              --resource-group "$RG" \
              --hostname "$DOMAIN" \
              --environment "$ENV_NAME" \
              --validation-method CNAME || echo "⚠️ Failed to bind $DOMAIN (may need manual setup)"
          }

          bind_domain "${{ vars.INFRA_PREFIX }}-cms" "${{ vars.CMS_CUSTOM_DOMAIN }}"
          bind_domain "${{ vars.INFRA_PREFIX }}-mcp" "${{ vars.MCP_CUSTOM_DOMAIN }}"

  verify:
    needs: [publish, deploy]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Blue/green: probe the *new* revision via its per-revision FQDN
      # while the previous revision keeps serving 100% of real traffic.
      # Only flip traffic if the smoke probes pass; otherwise deactivate
      # the bad revision so the previous one keeps serving forever.
      - name: Resolve new-revision FQDNs
        id: fqdn
        run: |
          set -euo pipefail
          CMS_APP="${{ vars.INFRA_PREFIX }}-cms"
          MCP_APP="${{ vars.INFRA_PREFIX }}-mcp"
          RG="${{ env.AZURE_RESOURCE_GROUP }}"
          NEW_CMS_REV='${{ needs.deploy.outputs.new_cms_revision }}'
          NEW_MCP_REV='${{ needs.deploy.outputs.new_mcp_revision }}'

          # The per-revision FQDN is the canonical way to reach a 0%-traffic
          # revision. Format: <app>--<suffix>.<env-default-domain>.
          CMS_FQDN=$(az containerapp revision show \
            --name "$CMS_APP" --resource-group "$RG" \
            --revision "$NEW_CMS_REV" \
            --query "properties.fqdn" -o tsv 2>/dev/null || echo "")
          MCP_FQDN=$(az containerapp revision show \
            --name "$MCP_APP" --resource-group "$RG" \
            --revision "$NEW_MCP_REV" \
            --query "properties.fqdn" -o tsv 2>/dev/null || echo "")

          if [ -z "$CMS_FQDN" ]; then
            echo "::error::could not resolve per-revision FQDN for $NEW_CMS_REV"
            exit 1
          fi
          echo "  cms new revision: $NEW_CMS_REV @ $CMS_FQDN"
          echo "  mcp new revision: $NEW_MCP_REV @ ${MCP_FQDN:-<none>}"
          echo "cms_fqdn=$CMS_FQDN" >> "$GITHUB_OUTPUT"
          echo "mcp_fqdn=$MCP_FQDN" >> "$GITHUB_OUTPUT"

      - name: Wait for new CMS revision to become healthy
        id: health
        run: |
          EXPECTED="${{ needs.publish.outputs.version }}"
          FQDN='${{ steps.fqdn.outputs.cms_fqdn }}'
          URL="https://${FQDN}/healthz"
          echo "Polling $URL — expecting version $EXPECTED ..."
          LAST_VERSION=""
          for i in $(seq 1 30); do
            CODE=$(curl -s -o /tmp/health.json -w '%{http_code}' "$URL" --max-time 5 || echo "000")
            if [ "$CODE" = "200" ]; then
              LAST_VERSION=$(cat /tmp/health.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('version','?'))")
              if [ "$LAST_VERSION" = "$EXPECTED" ]; then
                echo "✅ CMS healthy — version $LAST_VERSION (attempt $i)"
                echo "status=ok" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              echo "  attempt $i — version $LAST_VERSION != $EXPECTED, waiting 10s ..."
            else
              echo "  attempt $i — HTTP $CODE, waiting 10s ..."
            fi
            sleep 10
          done
          echo "status=failed" >> "$GITHUB_OUTPUT"
          echo "last_version=$LAST_VERSION" >> "$GITHUB_OUTPUT"
          echo "::error::New CMS revision did not reach expected version $EXPECTED within 5 minutes (last: ${LAST_VERSION:-no response})"

      - name: Post-deploy smoke probes (against new revision)
        id: smoke
        if: steps.health.outputs.status == 'ok'
        run: |
          FQDN='${{ steps.fqdn.outputs.cms_fqdn }}'
          fail=0

          # Unauthenticated aggregated health endpoint — exercises the
          # CMS↔MCP service-key trust chain plus the deploy-shape config
          # check without needing a session.
          echo "── GET /healthz/system ──"
          CODE=$(curl -s -o /tmp/sys.json -w '%{http_code}' "https://${FQDN}/healthz/system" --max-time 10 || echo "000")
          echo "  HTTP $CODE"
          cat /tmp/sys.json 2>/dev/null || true
          echo ""
          if [ "$CODE" != "200" ]; then
            echo "::error::/healthz/system returned HTTP $CODE"
            fail=1
          else
            STATUS=$(python3 -c "import json; d=json.load(open('/tmp/sys.json')); print(d.get('status','?'))")
            if [ "$STATUS" != "ok" ]; then
              echo "::error::/healthz/system reported status=$STATUS"
              python3 scripts/explain_healthz_system.py /tmp/sys.json || true
              fail=1
            fi
          fi

          if [ "$fail" -ne 0 ]; then
            echo "smoke=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "smoke=ok" >> "$GITHUB_OUTPUT"
          echo "✅ All post-deploy smoke probes passed against new revision"

      # Happy path: shift 100% traffic to the new revisions of both apps.
      #
      # Retries: `az containerapp ingress traffic set` has been observed
      # to fail ~20s after issue with
      #   ERROR: The containerapp '$app' does not exist in group '$RG'
      # despite the container app demonstrably existing (the previous
      # smoke step in the same job successfully called
      # `az containerapp revision show` against the same --name/--resource-group
      # pair, and curl against the per-revision FQDN returned 200 with
      # the right version). The 20s wall-clock + the immediate-prior
      # successful read against the same resource point at ARM
      # read-after-write consistency on the Microsoft.App PATCH path
      # rather than RBAC/ResourceNotFound. Three attempts with 30s
      # backoff rides out the observed window without masking real
      # failures (a true ResourceNotFound returns sub-1s).
      - name: Flip traffic to new revisions
        id: flip
        if: steps.health.outputs.status == 'ok' && steps.smoke.outputs.smoke == 'ok'
        run: |
          set -euo pipefail
          CMS_APP="${{ vars.INFRA_PREFIX }}-cms"
          MCP_APP="${{ vars.INFRA_PREFIX }}-mcp"
          RG="${{ env.AZURE_RESOURCE_GROUP }}"
          NEW_CMS_REV='${{ needs.deploy.outputs.new_cms_revision }}'
          NEW_MCP_REV='${{ needs.deploy.outputs.new_mcp_revision }}'
          PREV_CMS='${{ needs.deploy.outputs.previous_cms_revision }}'
          PREV_MCP='${{ needs.deploy.outputs.previous_mcp_revision }}'

          flip() {
            local app="$1" new="$2" prev="$3" attempt
            echo "── flipping $app traffic to $new ──"
            for attempt in 1 2 3; do
              echo "  attempt $attempt/3"
              if [ -n "$prev" ] && [ "$prev" != "$new" ]; then
                # 100% to new, 0% to old. Listing old at weight 0 keeps it
                # active and reachable via its own per-revision FQDN for a
                # quick rollback ("az containerapp ingress traffic set
                # --revision-weight $prev=100").
                if az containerapp ingress traffic set \
                    --name "$app" --resource-group "$RG" \
                    --revision-weight "$new=100" "$prev=0"; then
                  return 0
                fi
              else
                if az containerapp ingress traffic set \
                    --name "$app" --resource-group "$RG" \
                    --revision-weight "$new=100"; then
                  return 0
                fi
              fi
              if [ "$attempt" -lt 3 ]; then
                echo "  flip attempt $attempt failed — sleeping 30s before retry"
                sleep 30
              fi
            done
            echo "::error::traffic flip for $app failed after 3 attempts"
            return 1
          }

          flip "$CMS_APP" "$NEW_CMS_REV" "$PREV_CMS"
          flip "$MCP_APP" "$NEW_MCP_REV" "$PREV_MCP"
          echo "✅ Traffic flipped — $NEW_CMS_REV is now serving production"

      # Container Apps "Active" revisions keep their minReplicas pods running
      # regardless of traffic weight. Without this step, every deploy adds
      # 2 idle CMS pods (and 1 idle MCP pod) that still hold open Postgres
      # connections — the structural cause of the 2026-05-06T13-14Z Sev2
      # (4 stacked active revisions × 2 replicas exhausted PG max_connections=50).
      # Keep the new revision (currently serving) and the immediate previous
      # one (one-click rollback target via "az containerapp ingress traffic
      # set --revision-weight $prev=100"); deactivate everything else.
      - name: Deactivate stale revisions
        if: steps.health.outputs.status == 'ok' && steps.smoke.outputs.smoke == 'ok'
        run: |
          set -uo pipefail
          CMS_APP="${{ vars.INFRA_PREFIX }}-cms"
          MCP_APP="${{ vars.INFRA_PREFIX }}-mcp"
          RG="${{ env.AZURE_RESOURCE_GROUP }}"
          NEW_CMS_REV='${{ needs.deploy.outputs.new_cms_revision }}'
          NEW_MCP_REV='${{ needs.deploy.outputs.new_mcp_revision }}'
          PREV_CMS='${{ needs.deploy.outputs.previous_cms_revision }}'
          PREV_MCP='${{ needs.deploy.outputs.previous_mcp_revision }}'

          deactivate_stale() {
            local app="$1" keep_new="$2" keep_prev="$3"
            echo "── deactivating stale revisions for $app (keeping $keep_new + $keep_prev) ──"
            local stale
            stale=$(az containerapp revision list \
              --name "$app" --resource-group "$RG" \
              --query "[?properties.active && name!='$keep_new' && name!='$keep_prev'].name" \
              -o tsv 2>/dev/null || echo "")
            if [ -z "$stale" ]; then
              echo "  (none)"
              return 0
            fi
            for rev in $stale; do
              echo "  deactivating $rev"
              az containerapp revision deactivate \
                --name "$app" --resource-group "$RG" \
                --revision "$rev" 2>&1 \
                || echo "  (failed to deactivate $rev — continuing)"
            done
          }

          deactivate_stale "$CMS_APP" "$NEW_CMS_REV" "$PREV_CMS"
          deactivate_stale "$MCP_APP" "$NEW_MCP_REV" "$PREV_MCP"
          echo "✅ Stale revisions deactivated — only current + previous remain warm"

      # Sad path: deactivate the new revisions so the previous ones keep
      # serving 100% of traffic.
      - name: Deactivate new revisions on failure
        if: failure() && (steps.health.outputs.status == 'failed' || steps.smoke.outputs.smoke == 'failed')
        run: |
          set +e
          CMS_APP="${{ vars.INFRA_PREFIX }}-cms"
          MCP_APP="${{ vars.INFRA_PREFIX }}-mcp"
          RG="${{ env.AZURE_RESOURCE_GROUP }}"
          NEW_CMS_REV='${{ needs.deploy.outputs.new_cms_revision }}'
          NEW_MCP_REV='${{ needs.deploy.outputs.new_mcp_revision }}'

          echo "── Smoke or health failed — deactivating new revisions; previous revision keeps serving ──"
          az containerapp revision deactivate \
            --name "$CMS_APP" --resource-group "$RG" \
            --revision "$NEW_CMS_REV" 2>&1 || echo "(failed to deactivate $NEW_CMS_REV)"
          az containerapp revision deactivate \
            --name "$MCP_APP" --resource-group "$RG" \
            --revision "$NEW_MCP_REV" 2>&1 || echo "(failed to deactivate $NEW_MCP_REV)"

      - name: Fetch container logs on failure
        if: failure() && (steps.health.outputs.status == 'failed' || steps.smoke.outputs.smoke == 'failed')
        run: |
          CMS_APP="${{ vars.INFRA_PREFIX }}-cms"
          NEW_CMS_REV='${{ needs.deploy.outputs.new_cms_revision }}'
          echo "──── Console logs (last 150 lines) ────"
          az containerapp logs show \
            --name "$CMS_APP" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --revision "$NEW_CMS_REV" \
            --type console --tail 150 2>&1 || echo "(failed to fetch console logs)"

          echo ""
          echo "──── System logs (last 50 lines) ────"
          az containerapp logs show \
            --name "$CMS_APP" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --revision "$NEW_CMS_REV" \
            --type system --tail 50 2>&1 || echo "(failed to fetch system logs)"

          echo ""
          echo "──── Active revisions ────"
          az containerapp revision list \
            --name "$CMS_APP" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            -o table 2>&1 || echo "(failed to list revisions)"

      # Sad path #2: traffic flip itself failed (after smoke + health
      # passed). We intentionally do NOT auto-deactivate the new revisions
      # here because the flip could be partially complete (e.g. CMS
      # flipped successfully but MCP did not), and deactivating a revision
      # that has traffic weight assigned would 503 prod. Surface enough
      # state for an operator to remediate by hand.
      - name: Diagnose flip failure
        if: failure() && steps.flip.outcome == 'failure'
        run: |
          set +e
          CMS_APP="${{ vars.INFRA_PREFIX }}-cms"
          MCP_APP="${{ vars.INFRA_PREFIX }}-mcp"
          RG="${{ env.AZURE_RESOURCE_GROUP }}"
          NEW_CMS_REV='${{ needs.deploy.outputs.new_cms_revision }}'
          NEW_MCP_REV='${{ needs.deploy.outputs.new_mcp_revision }}'
          PREV_CMS='${{ needs.deploy.outputs.previous_cms_revision }}'
          PREV_MCP='${{ needs.deploy.outputs.previous_mcp_revision }}'

          echo "::error::Traffic flip step failed after retries — manual remediation required"
          echo ""
          echo "──── Current CMS ingress traffic ────"
          az containerapp ingress traffic show \
            --name "$CMS_APP" --resource-group "$RG" -o table 2>&1 \
            || echo "(failed to show CMS traffic)"
          echo ""
          echo "──── Current MCP ingress traffic ────"
          az containerapp ingress traffic show \
            --name "$MCP_APP" --resource-group "$RG" -o table 2>&1 \
            || echo "(failed to show MCP traffic)"
          echo ""
          echo "──── Active revisions ────"
          az containerapp revision list \
            --name "$CMS_APP" --resource-group "$RG" -o table 2>&1 \
            || echo "(failed to list CMS revisions)"
          az containerapp revision list \
            --name "$MCP_APP" --resource-group "$RG" -o table 2>&1 \
            || echo "(failed to list MCP revisions)"
          echo ""
          echo "To complete the flip manually (recommended — new revision is healthy):"
          echo "  az containerapp ingress traffic set --name $CMS_APP -g $RG --revision-weight $NEW_CMS_REV=100 $PREV_CMS=0"
          echo "  az containerapp ingress traffic set --name $MCP_APP -g $RG --revision-weight $NEW_MCP_REV=100 $PREV_MCP=0"
          echo ""
          echo "To roll back instead:"
          echo "  az containerapp ingress traffic set --name $CMS_APP -g $RG --revision-weight $PREV_CMS=100"
          echo "  az containerapp ingress traffic set --name $MCP_APP -g $RG --revision-weight $PREV_MCP=100"

      - name: Fail the job on health/smoke failure
        if: steps.health.outputs.status == 'failed' || steps.smoke.outputs.smoke == 'failed'
        run: |
          echo "::error::Deployment verification failed — new revision deactivated; previous revision continues to serve traffic"
          exit 1

  # Commit the auto-incremented version back to main so the next deploy
  # starts from the newly-released version.  Runs only after verify passes,
  # so a failed deploy does not advance the version on main.  The commit
  # uses "[skip ci]" to avoid re-triggering Tests/publish on the bump itself.
  bump-main:
    needs: [publish, deploy, verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # GITHUB_TOKEN works if main is unprotected, or if
          # github-actions[bot] is on the branch-protection bypass list.
          # If main is PR-protected and the bot can't bypass, create a
          # repo secret VERSION_BUMP_TOKEN with a PAT (contents: write)
          # and it will be used instead.
          token: ${{ secrets.VERSION_BUMP_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Bump version and push
        env:
          NEW_VERSION: ${{ needs.publish.outputs.version }}
        run: |
          set -euo pipefail
          current=$(python3 -c "exec(open('cms/__init__.py').read()); print(__version__)")
          if [ "$current" = "$NEW_VERSION" ]; then
            echo "cms/__init__.py is already at $NEW_VERSION — nothing to commit."
            exit 0
          fi
          sed -i "s/^__version__ = .*/__version__ = \"$NEW_VERSION\"/" cms/__init__.py
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cms/__init__.py
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]" \
                     -m "Auto-bumped by publish-image.yml after successful deploy." \
                     -m "Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git push origin HEAD:main

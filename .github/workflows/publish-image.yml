name: Publish & Deploy

on:
  workflow_run:
    workflows: [Smoke Test]
    types: [completed]
    branches: [main]

concurrency:
  group: publish-deploy
  cancel-in-progress: false

permissions:
  contents: write          # needed to push the auto-bump commit back to main
  packages: write
  id-token: write  # OIDC token for Azure login

env:
  ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      cms_digest: ${{ steps.acr_cms.outputs.digest }}
      mcp_digest: ${{ steps.acr_mcp.outputs.digest }}
      worker_digest: ${{ steps.acr_worker.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute next version
        id: version
        run: |
          # Read current version from main…
          current=$(python3 -c "exec(open('cms/__init__.py').read()); print(__version__)")
          # …and bump the patch component.
          IFS=. read -r major minor patch <<< "$current"
          next="${major}.${minor}.$((patch + 1))"
          echo "current=$current"
          echo "next=$next"
          echo "version=$next" >> "$GITHUB_OUTPUT"
          # Write the bumped version into the working tree so the Docker
          # images bake it in (/healthz will report $next).  The commit
          # back to main happens in the bump-main job after verify succeeds.
          sed -i "s/^__version__ = .*/__version__ = \"$next\"/" cms/__init__.py
          grep __version__ cms/__init__.py

      # ── GHCR (public images) ──
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CMS to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/sslivins/agora-cms:latest
            ghcr.io/sslivins/agora-cms:${{ steps.version.outputs.version }}

      - name: Build and push MCP to GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./mcp
          push: true
          tags: |
            ghcr.io/sslivins/agora-cms-mcp:latest
            ghcr.io/sslivins/agora-cms-mcp:${{ steps.version.outputs.version }}

      - name: Build and push Worker to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            ghcr.io/sslivins/agora-worker:latest
            ghcr.io/sslivins/agora-worker:${{ steps.version.outputs.version }}

      # ── ACR (Azure deployment) ──
      # We push human-friendly :version and :latest tags for rollback and
      # observability, but the deploy job pins by immutable digest so a
      # stale/mutated tag can never result in an unexpected image running.
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name agoracmsacr

      - name: Push CMS image to ACR
        id: acr_cms
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/agora-cms:latest
            ${{ env.ACR_REGISTRY }}/agora-cms:${{ steps.version.outputs.version }}

      - name: Push MCP image to ACR
        id: acr_mcp
        uses: docker/build-push-action@v6
        with:
          context: ./mcp
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/agora-cms-mcp:latest
            ${{ env.ACR_REGISTRY }}/agora-cms-mcp:${{ steps.version.outputs.version }}

      - name: Push Worker image to ACR
        id: acr_worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/agora-worker:latest
            ${{ env.ACR_REGISTRY }}/agora-worker:${{ steps.version.outputs.version }}

      - name: Record image digests
        run: |
          echo "CMS digest:    ${{ steps.acr_cms.outputs.digest }}"
          echo "MCP digest:    ${{ steps.acr_mcp.outputs.digest }}"
          echo "Worker digest: ${{ steps.acr_worker.outputs.digest }}"

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Idempotent infrastructure deploy — creates new resources (queues,
      # worker jobs, etc.) and updates existing ones to match Bicep definitions.
      # Safe to run on every deploy; Bicep only changes what's different.
      #
      # Images are pinned by immutable content digest (registry@sha256:...)
      # rather than by tag.  This guarantees that:
      #   * ACA always sees a new image reference and rolls a fresh revision
      #     (no more "same tag, stale revision" failures).
      #   * A mutated/overwritten tag can never cause an unexpected image
      #     to be deployed.
      # Assemble FLEET_REGISTER_SECRETS from zero-or-more GH Actions secrets
      # named FLEET_REGISTER_SECRET_<FLEET_ID> (fleet-id uppercased, '-' -> '_').
      # Adding a new fleet is: add one repo secret; no YAML edit needed.
      - name: Build fleetRegisterSecrets JSON from per-fleet secrets
        id: fleet_secrets
        env:
          ALL_SECRETS_JSON: ${{ toJSON(secrets) }}
        run: |
          MAP=$(printf '%s' "$ALL_SECRETS_JSON" | jq -c '
            to_entries
            | map(select(.key | startswith("FLEET_REGISTER_SECRET_")))
            | map({
                key: (.key | sub("^FLEET_REGISTER_SECRET_"; "") | ascii_downcase | gsub("_"; "-")),
                value: .value
              })
            | from_entries
          ')
          if [ -z "$MAP" ] || [ "$MAP" = "null" ]; then MAP='{}'; fi
          # Count without exposing values.
          COUNT=$(printf '%s' "$MAP" | jq 'length')
          echo "fleet-count=$COUNT" >> "$GITHUB_OUTPUT"
          # Mask before writing to the step output so logs never echo the value.
          echo "::add-mask::$MAP"
          echo "map<<EOF" >> "$GITHUB_OUTPUT"
          echo "$MAP" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Assembled fleetRegisterSecrets with $COUNT fleet(s)"

      - name: Deploy infrastructure
        run: |
          CMS_REF='${{ env.ACR_REGISTRY }}/agora-cms@${{ needs.publish.outputs.cms_digest }}'
          MCP_REF='${{ env.ACR_REGISTRY }}/agora-cms-mcp@${{ needs.publish.outputs.mcp_digest }}'
          WORKER_REF='${{ env.ACR_REGISTRY }}/agora-worker@${{ needs.publish.outputs.worker_digest }}'
          echo "Deploying:"
          echo "  cms:    $CMS_REF"
          echo "  mcp:    $MCP_REF"
          echo "  worker: $WORKER_REF"
          az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters \
              prefix='${{ vars.INFRA_PREFIX }}' \
              postgresAdminPassword='${{ secrets.POSTGRES_ADMIN_PASSWORD }}' \
              cmsSecretKey='${{ secrets.CMS_SECRET_KEY }}' \
              cmsAdminPassword='${{ secrets.CMS_ADMIN_PASSWORD }}' \
              wpsConnectionString='${{ secrets.WPS_CONNECTION_STRING }}' \
              fleetRegisterSecrets='${{ steps.fleet_secrets.outputs.map }}' \
              adminPrincipalId='${{ secrets.ADMIN_PRINCIPAL_ID }}' \
              deployRoleAssignments=false \
              cmsImage="$CMS_REF" \
              mcpImage="$MCP_REF" \
              workerImage="$WORKER_REF"

      - name: Bind custom domains (if configured)
        if: vars.CMS_CUSTOM_DOMAIN != '' || vars.MCP_CUSTOM_DOMAIN != ''
        run: |
          ENV_NAME="${{ vars.INFRA_PREFIX }}-env"
          RG="${{ env.AZURE_RESOURCE_GROUP }}"

          bind_domain() {
            local APP_NAME="$1" DOMAIN="$2"
            [ -z "$DOMAIN" ] && return 0

            # Check if already bound with cert
            BINDING=$(az containerapp hostname list --name "$APP_NAME" --resource-group "$RG" \
              --query "[?name=='$DOMAIN'].bindingType" -o tsv 2>/dev/null)
            if [ "$BINDING" = "SniEnabled" ]; then
              echo "✅ $DOMAIN already bound with cert to $APP_NAME"
              return 0
            fi

            # Step 1: Add hostname to app (creates unbound entry)
            echo "Adding hostname $DOMAIN to $APP_NAME..."
            az containerapp hostname add \
              --name "$APP_NAME" \
              --resource-group "$RG" \
              --hostname "$DOMAIN" 2>/dev/null || true

            # Step 2: Bind with managed certificate
            echo "Binding managed certificate for $DOMAIN..."
            az containerapp hostname bind \
              --name "$APP_NAME" \
              --resource-group "$RG" \
              --hostname "$DOMAIN" \
              --environment "$ENV_NAME" \
              --validation-method CNAME || echo "⚠️ Failed to bind $DOMAIN (may need manual setup)"
          }

          bind_domain "${{ vars.INFRA_PREFIX }}-cms" "${{ vars.CMS_CUSTOM_DOMAIN }}"
          bind_domain "${{ vars.INFRA_PREFIX }}-mcp" "${{ vars.MCP_CUSTOM_DOMAIN }}"

  verify:
    needs: [publish, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Wait for CMS to become healthy
        id: health
        run: |
          EXPECTED="${{ needs.publish.outputs.version }}"
          FQDN=$(az containerapp show \
            --name ${{ vars.INFRA_PREFIX }}-cms \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          URL="https://${FQDN}/healthz"
          echo "Polling $URL — expecting version $EXPECTED ..."
          LAST_VERSION=""
          for i in $(seq 1 30); do
            CODE=$(curl -s -o /tmp/health.json -w '%{http_code}' "$URL" --max-time 5 || echo "000")
            if [ "$CODE" = "200" ]; then
              LAST_VERSION=$(cat /tmp/health.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('version','?'))")
              if [ "$LAST_VERSION" = "$EXPECTED" ]; then
                echo "✅ CMS healthy — version $LAST_VERSION (attempt $i)"
                echo "status=ok" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              echo "  attempt $i — version $LAST_VERSION != $EXPECTED, waiting 10s ..."
            else
              echo "  attempt $i — HTTP $CODE, waiting 10s ..."
            fi
            sleep 10
          done
          echo "status=failed" >> "$GITHUB_OUTPUT"
          echo "last_version=$LAST_VERSION" >> "$GITHUB_OUTPUT"
          echo "❌ CMS did not reach expected version $EXPECTED within 5 minutes (last: ${LAST_VERSION:-no response})"

      - name: Fetch container logs on failure
        if: steps.health.outputs.status == 'failed'
        run: |
          echo "──── Console logs (last 150 lines) ────"
          az containerapp logs show \
            --name agoracms-cms \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --type console --tail 150 2>&1 || echo "(failed to fetch console logs)"

          echo ""
          echo "──── System logs (last 50 lines) ────"
          az containerapp logs show \
            --name agoracms-cms \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --type system --tail 50 2>&1 || echo "(failed to fetch system logs)"

          echo ""
          echo "──── Active revisions ────"
          az containerapp revision list \
            --name agoracms-cms \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            -o table 2>&1 || echo "(failed to list revisions)"

      - name: Fail if version mismatch
        if: steps.health.outputs.status == 'failed'
        run: |
          echo "::error::Deployment verification failed — expected version ${{ needs.publish.outputs.version }} but got ${{ steps.health.outputs.last_version }}"
          exit 1

      - name: Post-deploy smoke probes
        run: |
          FQDN=$(az containerapp show \
            --name ${{ vars.INFRA_PREFIX }}-cms \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          fail=0

          # Unauthenticated aggregated health endpoint — exercises the
          # CMS↔MCP service-key trust chain without needing a session.
          echo "── GET /healthz/system ──"
          CODE=$(curl -s -o /tmp/sys.json -w '%{http_code}' "https://${FQDN}/healthz/system" --max-time 10 || echo "000")
          echo "  HTTP $CODE"
          cat /tmp/sys.json 2>/dev/null || true
          echo ""
          if [ "$CODE" != "200" ]; then
            echo "::error::/healthz/system returned HTTP $CODE"
            fail=1
          else
            # Parse the JSON and fail on any degraded subsystem.
            STATUS=$(python3 -c "import json; d=json.load(open('/tmp/sys.json')); print(d.get('status','?'))")
            if [ "$STATUS" != "ok" ]; then
              echo "::error::/healthz/system reported status=$STATUS"
              fail=1
            fi
          fi

          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "✅ All post-deploy smoke probes passed"

  # Commit the auto-incremented version back to main so the next deploy
  # starts from the newly-released version.  Runs only after verify passes,
  # so a failed deploy does not advance the version on main.  The commit
  # uses "[skip ci]" to avoid re-triggering Tests/publish on the bump itself.
  bump-main:
    needs: [publish, deploy, verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # GITHUB_TOKEN works if main is unprotected, or if
          # github-actions[bot] is on the branch-protection bypass list.
          # If main is PR-protected and the bot can't bypass, create a
          # repo secret VERSION_BUMP_TOKEN with a PAT (contents: write)
          # and it will be used instead.
          token: ${{ secrets.VERSION_BUMP_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Bump version and push
        env:
          NEW_VERSION: ${{ needs.publish.outputs.version }}
        run: |
          set -euo pipefail
          current=$(python3 -c "exec(open('cms/__init__.py').read()); print(__version__)")
          if [ "$current" = "$NEW_VERSION" ]; then
            echo "cms/__init__.py is already at $NEW_VERSION — nothing to commit."
            exit 0
          fi
          sed -i "s/^__version__ = .*/__version__ = \"$NEW_VERSION\"/" cms/__init__.py
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cms/__init__.py
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]" \
                     -m "Auto-bumped by publish-image.yml after successful deploy." \
                     -m "Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git push origin HEAD:main

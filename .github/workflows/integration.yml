name: Integration (multi-replica full)

# Advisory, on-demand full integration suite. The ``smoke``-marked
# subset of ``tests/integration/`` runs on every PR through ``ci-gate``
# (see ``tests.yml``). Heavier tests that are too slow or flaky for
# the required gate (chaos, fake-device fleet, long-running
# back-to-back schedules, etc.) should skip the ``smoke`` marker and
# run here instead. Currently this workflow is a placeholder — no
# non-smoke integration tests exist yet.

on:
  workflow_dispatch:
  schedule:
    # 09:00 UTC nightly so we catch regressions in the non-smoke
    # surface without gating every PR on a 20 min suite.
    - cron: '0 9 * * *'

jobs:
  integration-full:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install host-side test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt

      - name: Run full multi-replica integration suite
        env:
          AGORA_RUN_INTEGRATION: "1"
        run: |
          pytest tests/integration/ \
            --run-integration \
            -p no:xdist -p no:timeout \
            -v --tb=short

      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose -f tests/integration/docker-compose.integration.yml logs \
            --no-color --tail=500 || true

      - name: Tear down
        if: always()
        run: |
          docker compose -f tests/integration/docker-compose.integration.yml \
            down -v --remove-orphans || true

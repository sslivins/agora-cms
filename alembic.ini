# Alembic config for agora-cms.
#
# The sqlalchemy.url value here is a placeholder — env.py overrides it at
# runtime from SharedSettings (AGORA_CMS_DATABASE_URL).  We keep a plausible
# default so `alembic` CLI commands run from this directory work in local
# dev without any extra env setup.

[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = postgresql+asyncpg://agora:agora@localhost:5432/agora_cms

# We use plain numeric revision IDs (0001, 0002, ...) rather than the
# default random hex.  This keeps the `versions/` directory sortable and
# makes PR diffs immediately obvious.
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

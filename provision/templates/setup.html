<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agora Setup</title>
    <link rel="stylesheet" href="/static/setup.css">
</head>
<body>
    <div class="setup-container">
        <div class="brand">
            <h1>Agora</h1>
            <p>Device Setup</p>
        </div>

        <!-- No <form> tag — iOS CNA WebView has broken native validation.
             Submit is handled entirely via JS onclick. -->
        <div id="setup-form">
            <!-- Wi-Fi -->
            <div class="card">
                <h2>Wi-Fi Network</h2>
                <label for="wifi-ssid">Network</label>
                <div class="wifi-select-row">
                    <select id="wifi-ssid" autofocus>
                        <option value="">Scanning…</option>
                    </select>
                    <button type="button" class="btn-scan" onclick="scanNetworks()" id="scan-btn">Scan</button>
                </div>

                <label for="wifi-password">Password</label>
                <input type="password" id="wifi-password" placeholder="Enter Wi-Fi password" autocomplete="one-time-code" data-1p-ignore data-lpignore="true">
            </div>

            <!-- CMS -->
            <div class="card">
                <h2>CMS Server <span style="font-size: 0.75rem; text-transform: none; font-weight: normal;">(optional)</span></h2>
                <div class="form-row">
                    <div class="grow">
                        <label for="cms-host">Server Address</label>
                        <input type="text" id="cms-host" placeholder="agora-cms.local">
                    </div>
                    <div class="port">
                        <label for="cms-port">Port</label>
                        <input type="text" id="cms-port" placeholder="8080">
                    </div>
                </div>
                <span class="form-hint">Leave blank to auto-discover via mDNS (agora-cms.local), or enter an address manually.</span>
            </div>

            <!-- Device Name -->
            <div class="card">
                <h2>Device Name <span style="font-size: 0.75rem; text-transform: none; font-weight: normal;">(optional)</span></h2>
                <label for="device-name">Name</label>
                <input type="text" id="device-name" placeholder="e.g. lobby-display-01">
                <span class="form-hint">A friendly name to identify this device.</span>
            </div>

            <div id="status" class="status"></div>

            <button type="button" class="btn-primary" id="submit-btn" onclick="submitSetup()">Set Up Device</button>
        </div>
    </div>

    <script>
    /* ── Wi-Fi Scan ── */
    async function scanNetworks() {
        var select = document.getElementById("wifi-ssid");
        var scanBtn = document.getElementById("scan-btn");

        scanBtn.disabled = true;
        scanBtn.textContent = "…";
        select.innerHTML = '<option value="">Scanning…</option>';

        try {
            var res = await fetch("/api/wifi/scan");
            var data = await res.json();

            select.innerHTML = "";
            if (data.networks.length === 0) {
                select.innerHTML = '<option value="">No networks found</option>';
            } else {
                select.innerHTML = '<option value="">Select a network…</option>';
                for (var i = 0; i < data.networks.length; i++) {
                    var net = data.networks[i];
                    var opt = document.createElement("option");
                    opt.value = net.ssid;

                    var signalIcon;
                    if (net.signal >= 70) signalIcon = "▰▰▰";
                    else if (net.signal >= 40) signalIcon = "▰▰▱";
                    else signalIcon = "▰▱▱";

                    var lock = net.security ? " 🔒" : "";
                    opt.textContent = net.ssid + " " + signalIcon + lock;
                    select.appendChild(opt);
                }
            }
        } catch (e) {
            select.innerHTML = '<option value="">Scan failed — try again</option>';
        }

        scanBtn.disabled = false;
        scanBtn.textContent = "Scan";
    }

    /* ── Provision Submit ── */
    async function submitSetup() {
        var statusEl = document.getElementById("status");
        var submitBtn = document.getElementById("submit-btn");

        var wifiSsid = document.getElementById("wifi-ssid").value;
        if (!wifiSsid) {
            statusEl.className = "status error";
            statusEl.textContent = "Please select a Wi-Fi network.";
            return;
        }

        submitBtn.disabled = true;
        statusEl.className = "status info";
        statusEl.innerHTML = '<span class="spinner"></span>Submitting…';

        var payload = {
            wifi_ssid: wifiSsid,
            wifi_password: document.getElementById("wifi-password").value,
            cms_host: document.getElementById("cms-host").value.trim(),
            cms_port: parseInt(document.getElementById("cms-port").value) || 8080,
            device_name: document.getElementById("device-name").value.trim(),
        };

        // Replace the entire form with a waiting screen immediately.
        // The AP will shut down as the device switches to client Wi-Fi,
        // so the phone will lose connection — this avoids the confusing
        // "jump back to CMS field" behaviour.
        function showWaitingScreen(message) {
            document.getElementById("setup-form").innerHTML =
                '<div class="card" style="text-align:center;padding:2rem 1.5rem">'
                + '<h2 style="margin-bottom:0.75rem">Setting Up…</h2>'
                + '<p style="color:#aaa;line-height:1.5">' + message + '</p>'
                + '</div>';
        }

        try {
            var res = await fetch("/api/provision", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
            });
            var data = await res.json();

            if (data.success) {
                showWaitingScreen(data.message);
            } else {
                statusEl.className = "status error";
                statusEl.textContent = data.error || "Setup failed.";
                submitBtn.disabled = false;
            }
        } catch (err) {
            // The AP shuts down when the device switches to client mode,
            // so losing the connection is the expected success signal.
            showWaitingScreen(
                "Setup complete! The device is connecting to your Wi-Fi network. "
                + "You can close this page."
            );
        }
    }

    /* ── Auto-scan on page load ── */
    scanNetworks();
    </script>
</body>
</html>

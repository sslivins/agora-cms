services:
  cms:
    image: ghcr.io/sslivins/agora-cms:latest
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - cms-assets:/opt/agora-cms/assets
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  db:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agora -d agora_cms"]
      interval: 5s
      timeout: 3s
      retries: 5

  mcp:
    image: ghcr.io/sslivins/agora-cms-mcp:latest
    ports:
      - "8000:8000"
    environment:
      - CMS_BASE_URL=http://cms:8080
      - CMS_USERNAME=${AGORA_CMS_ADMIN_USERNAME:-admin}
      - CMS_PASSWORD=${AGORA_CMS_ADMIN_PASSWORD:-agora}
    depends_on:
      - cms
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_API_VERSION=1.43
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true
    restart: unless-stopped

volumes:
  pgdata:
  cms-assets:

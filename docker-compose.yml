services:
  cms:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - cms-assets:/opt/agora-cms/assets

  db:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agora -d agora_cms"]
      interval: 5s
      timeout: 3s
      retries: 5

  ntp:
    image: alpine:3.21
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache chrony &&
        cat > /etc/chrony/chrony.conf <<'EOF'
        pool pool.ntp.org iburst
        driftfile /var/lib/chrony/drift
        makestep 1.0 3
        rtcsync
        allow all
        EOF
        exec chronyd -d -s
    cap_add:
      - SYS_TIME
    ports:
      - "123:123/udp"
    restart: unless-stopped

volumes:
  pgdata:
  cms-assets:

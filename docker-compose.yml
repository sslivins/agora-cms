services:
  agora-api:
    build: .
    container_name: agora-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /opt/agora/assets:/opt/agora/assets
      - /opt/agora/state:/opt/agora/state
      - /opt/agora/logs:/opt/agora/logs
      - /boot/agora-config.json:/boot/agora-config.json:ro
    environment:
      - AGORA_BASE=/opt/agora

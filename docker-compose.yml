services:
  cms:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - cms-assets:/opt/agora-cms/assets
      - mcp-shared:/shared

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    environment:
      - AGORA_CMS_WORKER_MODE=listen
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - cms-assets:/opt/agora-cms/assets

  mcp:
    build: ./mcp
    ports:
      - "8000:8000"
    environment:
      - CMS_BASE_URL=http://cms:8080
    depends_on:
      - cms
    volumes:
      - mcp-shared:/shared:ro

  db:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agora -d agora_cms"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  cms-assets:
  mcp-shared:

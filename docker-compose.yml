services:
  cms:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - cms-assets:/opt/agora-cms/assets
      - mcp-shared:/shared

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      - AGORA_CMS_WORKER_MODE=listen
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - cms-assets:/opt/agora-cms/assets

  mcp:
    build: ./mcp
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - CMS_BASE_URL=http://cms:8080
    depends_on:
      - cms
    volumes:
      - mcp-shared:/shared:ro

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agora -d agora_cms"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Local WPS-shaped broker for Stage 2 of the multi-replica rollout
  # (#344). Opt-in under the `wps` profile until Stage 2b wires the CMS
  # WPSTransport up to it. Today the default compose stack keeps using
  # the direct-WS path via `cms/routers/ws.py`.
  local-broker:
    build: ./local-broker
    profiles: ["wps"]
    restart: unless-stopped
    ports:
      - "7080:7080"
    environment:
      - WPS_ACCESS_KEY=${WPS_ACCESS_KEY:-dev-broker-access-key-change-me}
      - WPS_HUB=${WPS_HUB:-agora}
      - WPS_UPSTREAM_URL=${WPS_UPSTREAM_URL:-http://cms:8080/internal/wps/events}

volumes:
  pgdata:
  cms-assets:
  mcp-shared:

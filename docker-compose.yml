services:
  cms:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - cms-assets:/opt/agora-cms/assets

  mcp:
    build: ./mcp
    ports:
      - "8000:8000"
    environment:
      - CMS_BASE_URL=http://cms:8080
      - CMS_API_KEY=${CMS_API_KEY:-}
      # Legacy fallback (used if CMS_API_KEY is not set)
      - CMS_USERNAME=${AGORA_CMS_ADMIN_USERNAME:-admin}
      - CMS_PASSWORD=${AGORA_CMS_ADMIN_PASSWORD:-agora}
    depends_on:
      - cms

  db:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agora -d agora_cms"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  cms-assets:
